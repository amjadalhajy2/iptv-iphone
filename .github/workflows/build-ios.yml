name: Build Unsigned iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # حل مشكلة عدم تعرف Xcode على Node.js بوضعه في المسار الأساسي
      - name: Force Node into System Path
        run: sudo ln -s $(which node) /usr/local/bin/node || true

      - name: Install dependencies
        run: npm install

      - name: Prebuild iOS Project
        run: npx expo prebuild --platform ios

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      # أزلنا xcbeautify لكي نرى الخطأ الحقيقي إذا فشل التجميع
      - name: Build App (Raw Output)
        run: |
          cd ios
          export NODE_BINARY=$(command -v node)
          xcodebuild -workspace StreamIPTV.xcworkspace -scheme StreamIPTV -configuration Release -sdk iphoneos -derivedDataPath build CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" ENABLE_USER_SCRIPT_SANDBOXING=NO
          
      - name: Package to IPA
        run: |
          cd ios/build/Build/Products/Release-iphoneos
          mkdir Payload
          mv StreamIPTV.app Payload/
          zip -r ../../../../StreamIPTV.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: StreamIPTV-IPA
          path: StreamIPTV.ipa
