name: Build Unsigned iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Force Node into System Path
        run: sudo ln -s $(which node) /usr/local/bin/node || true

      - name: Find Project Directory
        id: find_dir
        run: |
          DIR=$(dirname $(find . -name "package.json" | head -n 1))
          echo "dir=$DIR" >> $GITHUB_ENV

      - name: Install dependencies and Force missing libraries
        run: |
          cd ${{ env.dir }}
          npm install
          npm install react-native-webview react-native-vlc-media-player

      - name: Clean and Prebuild iOS Project
        run: |
          cd ${{ env.dir }}
          rm -rf ios
          rm -rf .expo
          npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        run: |
          cd ${{ env.dir }}/ios
          pod install

      - name: Test JS Bundling
        run: |
          cd ${{ env.dir }}
          npx expo export --platform ios

      - name: Build App
        run: |
          cd ${{ env.dir }}/ios
          
          # 1. إنشاء ملف القوانين الصارمة لإجبار Xcode وسكربتاته على تخطي الحماية والتوقيع
          cat << 'EOF' > bypass.xcconfig
          CODE_SIGNING_ALLOWED=NO
          CODE_SIGNING_REQUIRED=NO
          CODE_SIGN_IDENTITY=
          EXPANDED_CODE_SIGN_IDENTITY=
          ENTITLEMENTS_REQUIRED=NO
          ENABLE_USER_SCRIPT_SANDBOXING=NO
          EOF
          
          # 2. تعميم الملف على بيئة البناء بالكامل
          export XCODE_XCCONFIG_FILE="$(pwd)/bypass.xcconfig"
          
          export NODE_BINARY=$(command -v node)
          echo "export NODE_BINARY=$(command -v node)" > .xcode.env.local
          
          # 3. تشغيل البناء مع ربطه بملف القوانين الإجباري
          xcodebuild -workspace StreamIPTV.xcworkspace -scheme StreamIPTV -configuration Release -sdk iphoneos -derivedDataPath build -xcconfig bypass.xcconfig
          
      - name: Package to IPA
        run: |
          cd ${{ env.dir }}/ios/build/Build/Products/Release-iphoneos
          mkdir -p Payload
          mv *.app Payload/
          zip -r ../../../../StreamIPTV.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: StreamIPTV-IPA
          path: '**/*.ipa'
