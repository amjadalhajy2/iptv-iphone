name: Build Unsigned iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ./StreamIPTV 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Prebuild iOS Project
        run: npx expo prebuild --platform ios

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

- name: Build App without Code Signing (For SideStore)
        run: |
          cd ios
          
          # هذا السطر هو الحل: يخبر نظام Xcode بالمسار الدقيق للـ Node.js حتى لا يفشل سكربت التجميع
          echo "export NODE_BINARY=$(command -v node)" > .xcode.env.local
          
          set -o pipefail
          xcodebuild -workspace StreamIPTV.xcworkspace -scheme StreamIPTV -configuration Release -sdk iphoneos -derivedDataPath build CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" ENABLE_USER_SCRIPT_SANDBOXING=NO | xcbeautify
                
      - name: Package to IPA
        run: |
          cd ios/build/Build/Products/Release-iphoneos
          mkdir Payload
          mv StreamIPTV.app Payload/
          zip -r ../../../../StreamIPTV.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: StreamIPTV-IPA
          path: StreamIPTV.ipa
