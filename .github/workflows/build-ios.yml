name: Build Unsigned iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch: # للسماح بتشغيل البناء يدوياً من واجهة GitHub

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Prebuild iOS Project
        run: npx expo prebuild --platform ios

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Build App without Code Signing (For SideStore)
        run: |
          cd ios
          # بناء التطبيق لمعمارية هواتف الآيفون وتخطي التوقيع
          xcodebuild -workspace StreamIPTV.xcworkspace -scheme StreamIPTV -configuration Release -sdk iphoneos -derivedDataPath build CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY=""
          
      - name: Package to IPA
        run: |
          cd ios/build/Build/Products/Release-iphoneos
          mkdir Payload
          mv StreamIPTV.app Payload/
          zip -r ../../../../StreamIPTV.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v3
        with:
          name: StreamIPTV-IPA
          path: StreamIPTV.ipa
