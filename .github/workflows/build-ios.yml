name: Build Unsigned iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Force Node into System Path
        run: sudo ln -s $(which node) /usr/local/bin/node || true

      - name: Find Project Directory
        id: find_dir
        run: |
          DIR=$(dirname $(find . -name "package.json" | head -n 1))
          echo "dir=$DIR" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          cd ${{ env.dir }}
          npm install
          npx expo install react-native-webview expo-screen-orientation
          npm install react-native-vlc-media-player @supabase/supabase-js react-native-url-polyfill react-native-blob-util

      - name: Clean and Prebuild
        run: |
          cd ${{ env.dir }}
          rm -rf ios .expo
          npx expo prebuild --platform ios --clean

      - name: Inject Podfile Bypass (Ruby)
        run: |
          cd ${{ env.dir }}/ios
          ruby -e "
          podfile = File.read('Podfile')
          bypass = %q{
              installer.pods_project.targets.each do |target|
                target.build_configurations.each do |config|
                  config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
                  config.build_settings['ENABLE_USER_SCRIPT_SANDBOXING'] = 'NO'
                end
              end
          }
          podfile.sub!(/post_install do \|installer\|/, %Q{post_install do |installer|\n#{bypass}})
          File.write('Podfile', podfile)
          "

      - name: Install CocoaPods
        run: |
          cd ${{ env.dir }}/ios
          pod install

      - name: Test JS Bundling & Clear Cache
        run: |
          cd ${{ env.dir }}
          export NODE_OPTIONS="--max-old-space-size=4096"
          npx expo export --platform ios -c

      - name: Create xcodebuild Wrapper
        run: |
          mkdir -p $HOME/custom_bin
          cat << 'EOF' > $HOME/custom_bin/xcodebuild
          #!/bin/bash
          /usr/bin/xcodebuild "$@" CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" EXPANDED_CODE_SIGN_IDENTITY="" ENABLE_USER_SCRIPT_SANDBOXING=NO
          EOF
          chmod +x $HOME/custom_bin/xcodebuild
          echo "$HOME/custom_bin" >> $GITHUB_PATH

      - name: Build App
        run: |
          cd ${{ env.dir }}/ios
          export NODE_BINARY=$(command -v node)
          export NODE_OPTIONS="--max-old-space-size=4096"
          echo "export NODE_BINARY=$(command -v node)" > .xcode.env.local
          echo "export NODE_OPTIONS=\"--max-old-space-size=4096\"" >> .xcode.env.local
          
          # 🔥 بحث دقيق في المجلد السطحي فقط لمنع التقاط الملفات الداخلية
          WORKSPACE=$(find . -maxdepth 1 -name "*.xcworkspace" | head -n 1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          
          echo "Building Workspace: $WORKSPACE with Scheme: $SCHEME"
          xcodebuild -workspace "$WORKSPACE" -scheme "$SCHEME" -configuration Release -sdk iphoneos -derivedDataPath build
                
      # 🔥 الجراحة النهائية: كسر الحماية داخل التطبيق الجاهز قبل تحزيمه

      - name: Package to IPA and Force ATS Bypass
        run: |
          cd ${{ env.dir }}/ios/build/Build/Products/Release-iphoneos
          
          # 🔥 بحث تلقائي عن مجلد التطبيق
          APP_DIR=$(find . -name "*.app" | head -n 1)
          APP_PLIST="$APP_DIR/Info.plist"
          
          echo "Patching Final Compiled App: $APP_PLIST"
          
          /usr/libexec/PlistBuddy -c "Delete :NSAppTransportSecurity" "$APP_PLIST" || true
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity dict" "$APP_PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSAllowsArbitraryLoads bool true" "$APP_PLIST"
          
          mkdir -p Payload
          mv *.app Payload/
          zip -r ../../../../AmjadStream.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AmjadStream-IPA
          path: '**/*.ipa'
