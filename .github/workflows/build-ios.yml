name: Build Unsigned iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. تحديث Node.js إلى الإصدار 20 (الإصدارات الحديثة من Expo تتطلبه)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Force Node into System Path
        run: sudo ln -s $(which node) /usr/local/bin/node || true

      - name: Find Project Directory
        id: find_dir
        run: |
          DIR=$(dirname $(find . -name "package.json" | head -n 1))
          echo "dir=$DIR" >> $GITHUB_ENV

      # 2. تثبيت إجباري للمكتبات لتفادي خطأ (Module not found)
      - name: Install dependencies and Force missing libraries
        run: |
          cd ${{ env.dir }}
          npm install
          npm install react-native-webview react-native-vlc-media-player

      - name: Prebuild iOS Project
        run: |
          cd ${{ env.dir }}
          rm -rf .expo
          npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        run: |
          cd ${{ env.dir }}/ios
          pod install

      # 3. اختبار تجميع الجافاسكريبت لكشف أي أخطاء في كود App.js بوضوح
      - name: Test JS Bundling (Reveal hidden errors)
        run: |
          cd ${{ env.dir }}
          npx expo export --platform ios

      - name: Build App
        run: |
          cd ${{ env.dir }}/ios
          export NODE_BINARY=$(command -v node)
          echo "export NODE_BINARY=$(command -v node)" > .xcode.env.local
          
          xcodebuild -workspace StreamIPTV.xcworkspace -scheme StreamIPTV -configuration Release -sdk iphoneos -derivedDataPath build CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" ENABLE_USER_SCRIPT_SANDBOXING=NO
          
      - name: Package to IPA
        run: |
          cd ${{ env.dir }}/ios/build/Build/Products/Release-iphoneos
          mkdir -p Payload
          mv *.app Payload/
          zip -r ../../../../StreamIPTV.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: StreamIPTV-IPA
          path: '**/*.ipa'
