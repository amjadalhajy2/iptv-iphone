name: Diagnostic iOS Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Force Node into System Path
        run: sudo ln -s $(which node) /usr/local/bin/node || true

      - name: Find Project Directory
        id: find_dir
        run: |
          DIR=$(dirname $(find . -name "package.json" | head -n 1))
          echo "dir=$DIR" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          cd ${{ env.dir }}
          npm install
          npx expo install react-native-webview
          npm install react-native-vlc-media-player @supabase/supabase-js react-native-url-polyfill react-native-blob-util

      - name: Create Custom ATS Bypass Plugin
        run: |
          cd ${{ env.dir }}
          cat << 'EOF' > withATSBypass.js
          const { withInfoPlist } = require('@expo/config-plugins');
          module.exports = function withATSBypass(config) {
            return withInfoPlist(config, (config) => {
              config.modResults.NSAppTransportSecurity = {
                NSAllowsArbitraryLoads: true,
                NSAllowsArbitraryLoadsInWebContent: true,
                NSAllowsLocalNetworking: true
              };
              return config;
            });
          };
          EOF
          
          node -e "
            const fs = require('fs');
            const app = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            app.expo = app.expo || {};
            app.expo.plugins = app.expo.plugins || [];
            app.expo.plugins = app.expo.plugins.filter(p => p !== 'expo-build-properties' && (!Array.isArray(p) || p[0] !== 'expo-build-properties'));
            if (!app.expo.plugins.includes('./withATSBypass.js')) app.expo.plugins.push('./withATSBypass.js');
            fs.writeFileSync('app.json', JSON.stringify(app, null, 2));
          "

      - name: Clean and Prebuild
        run: |
          cd ${{ env.dir }}
          rm -rf ios .expo
          npx expo prebuild --platform ios --clean

      # 🔬 خطوة تشخيصية 1: طباعة ملف الإعدادات قبل بناء التطبيق للتأكد من نجاح الحقن
      - name: Diagnostic - Print Info.plist before build
        run: |
          cd ${{ env.dir }}/ios
          PLIST=$(find . -name "Info.plist" -not -path "*/Pods/*" | head -n 1)
          echo "=== CONTENT OF INFO.PLIST ==="
          cat "$PLIST"
          echo "============================="

      - name: Inject Podfile Bypass (Ruby)
        run: |
          cd ${{ env.dir }}/ios
          ruby -e "
          podfile = File.read('Podfile')
          bypass = %q{
              installer.pods_project.targets.each do |target|
                target.build_configurations.each do |config|
                  config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
                  config.build_settings['ENABLE_USER_SCRIPT_SANDBOXING'] = 'NO'
                end
              end
          }
          podfile.sub!(/post_install do \|installer\|/, %Q{post_install do |installer|\n#{bypass}})
          File.write('Podfile', podfile)
          "

      - name: Install CocoaPods
        run: |
          cd ${{ env.dir }}/ios
          pod install

      - name: Create xcodebuild Wrapper
        run: |
          mkdir -p $HOME/custom_bin
          cat << 'EOF' > $HOME/custom_bin/xcodebuild
          #!/bin/bash
          /usr/bin/xcodebuild "$@" CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" EXPANDED_CODE_SIGN_IDENTITY="" ENABLE_USER_SCRIPT_SANDBOXING=NO
          EOF
          chmod +x $HOME/custom_bin/xcodebuild
          echo "$HOME/custom_bin" >> $GITHUB_PATH

      - name: Build App
        run: |
          cd ${{ env.dir }}/ios
          export NODE_BINARY=$(command -v node)
          export NODE_OPTIONS="--max-old-space-size=4096"
          echo "export NODE_BINARY=$(command -v node)" > .xcode.env.local
          echo "export NODE_OPTIONS=\"--max-old-space-size=4096\"" >> .xcode.env.local
          
          # تفعيل خيار حفظ التقارير النصية الشاملة لمعرفة جذر أي مشكلة
          xcodebuild -workspace StreamIPTV.xcworkspace -scheme StreamIPTV -configuration Release -sdk iphoneos -derivedDataPath build -resultBundlePath xcode_result.xcresult

      - name: Package to IPA
        if: success()
        run: |
          cd ${{ env.dir }}/ios/build/Build/Products/Release-iphoneos
          mkdir -p Payload
          mv *.app Payload/
          zip -r ../../../../StreamIPTV.ipa Payload

      - name: Upload IPA Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: StreamIPTV-IPA
          path: '**/*.ipa'

      # 🔬 خطوة تشخيصية 2: إذا فشل البناء، اجمع كل ملفات الـ Logs المخبأة وارفعها للمستخدم فوراً
      - name: Diagnostic - Upload Xcode Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: Xcode-Failure-Logs
          path: |
            **/ios/build/Logs/Build/*.log
            **/xcode_result.xcresult
