<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Amjad Stream</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root { --bg: #0a0a0a; --primary: #e50914; --text: #ffffff; }
        html, body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; position: fixed; }
        ::-webkit-scrollbar { display: none; }
        .hidden { display: none !important; }
        .svg-icon { fill: currentColor; width: 1.2em; height: 1.2em; vertical-align: middle; }

        .scrollable-screen { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; overflow-y: auto; overflow-x: hidden; background: var(--bg); -webkit-overflow-scrolling: touch; }
        
        #toast { visibility: hidden; width: 90vw; background-color: rgba(229, 9, 20, 0.95); color: #fff; text-align: center; border-radius: 2vw; padding: 3vw; position: fixed; z-index: 10000; left: 5vw; bottom: 4vh; font-size: 4vw; font-weight: bold; transition: opacity 0.4s; opacity: 0; }
        #toast.show { visibility: visible; opacity: 1; }

        header { width: 100vw; padding: calc(env(safe-area-inset-top) + 2vh) 4vw 3vw 4vw; background: linear-gradient(to bottom, rgba(0,0,0,0.95), rgba(0,0,0,0.5)); display: flex; flex-direction: column; gap: 2vh; z-index: 100; position: sticky; top: 0; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; width: 100%; direction: ltr; }
        .logo { font-size: 6vw; font-weight: 900; color: var(--primary); letter-spacing: 1px; }
        .user-section { display: flex; align-items: center; gap: 3vw; }
        .refresh-btn { background: rgba(255,255,255,0.1); color: white; border: none; border-radius: 50%; width: 10vw; height: 10vw; display: flex; align-items: center; justify-content: center; }
        .user-badge { display: flex; align-items: center; gap: 2vw; background: rgba(255,255,255,0.1); padding: 1vh 3vw; border-radius: 20px; font-size: 3.5vw; color: white; border: 1px solid rgba(255,255,255,0.2); }
        
        .nav-links { display: flex; flex-wrap: wrap; gap: 2vw; justify-content: center; width: 100%; direction: rtl; }
        .nav-item { background: rgba(255,255,255,0.08); border: none; color: white; font-size: 3.5vw; font-weight: 600; padding: 1.5vh 4vw; border-radius: 20px; transition: 0.3s; }
        .nav-item.active { background: var(--primary); }
        .search-box { width: 100%; margin-top: 1vh; direction: rtl; position: relative;}
        .search-box input { width: 100%; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 1.5vh 4vw; padding-right: 10vw; border-radius: 30px; font-size: 4vw; outline: none; }
        .search-icon { position: absolute; right: 3vw; top: 50%; transform: translateY(-50%); color: #aaa; }

        #main-content { padding-top: 2vh; padding-bottom: calc(env(safe-area-inset-bottom) + 10vh); width: 100vw; overflow-x: hidden; }
        .row-title { font-size: 5vw; font-weight: bold; margin: 0 4vw 1vh 4vw; }
        .categories-row { display: flex; gap: 2vw; overflow-x: auto; padding: 1vh 4vw; -webkit-overflow-scrolling: touch; }
        .category-chip { background: rgba(255,255,255,0.1); color: white; padding: 1.5vh 4vw; border-radius: 30px; font-size: 3.5vw; font-weight: bold; white-space: nowrap; border: none; }
        .category-chip.active { background: var(--primary); }
        
        .grid-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 3vw; padding: 2vh 4vw; margin-bottom: 5vh; }
        .grid-container.favorites-grid { grid-template-columns: repeat(3, 1fr); }
        .grid-container.live-grid { grid-template-columns: repeat(2, 1fr); gap: 4vw; } 
        
        .row-inner { display: flex; gap: 3vw; overflow-x: auto; padding: 1vh 4vw; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
        
        .card-container { perspective: 1000px; -webkit-perspective: 1000px; border-radius: 3vw; position: relative; width: 100%; aspect-ratio: 2 / 3; background: transparent; }
        .row-inner .card-container { width: 35vw; flex: 0 0 auto; }
        .card { width: 100%; height: 100%; position: relative; transition: transform 0.6s; -webkit-transition: -webkit-transform 0.6s; transform-style: preserve-3d; -webkit-transform-style: preserve-3d; border-radius: 3vw; box-shadow: 0 4px 8px rgba(0,0,0,0.5); border: none; cursor: pointer; will-change: transform; }
        .card.flipped { transform: rotateY(180deg); -webkit-transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; -webkit-backface-visibility: hidden; border-radius: 3vw; overflow: hidden; background: #1a1a1a; }
        .card-front img { width: 100%; height: 100%; object-fit: cover; }
        
        /* 🔥 تصميم الصورة المنقلبة والشريط السفلي الجديد (Split Bar) */
        .card-back { transform: rotateY(180deg); -webkit-transform: rotateY(180deg); background: rgba(20,20,20,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; border: 1px solid var(--primary); }
        .card-back-content { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding-bottom: 6.5vh; padding-top: 2vh; }
        .card-back-text { color: white; font-size: 3vw; line-height: 1.8; font-weight: bold; }
        
        .flip-footer-bar { position: absolute; bottom: 0; left: 0; width: 100%; height: 6.5vh; display: flex; background: rgba(0,0,0,0.8); border-top: 1px solid rgba(255,255,255,0.2); }
        .flip-footer-btn { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 5vw; font-weight: bold; color: white; cursor: pointer; transition: background 0.3s; }
        .flip-footer-btn:active { background: rgba(255,255,255,0.1); }
        .flip-footer-right { border-left: 1px solid rgba(255,255,255,0.2); font-family: 'Arial', sans-serif; font-size: 6vw; }
        .flip-footer-left svg { width: 4.5vw; height: 4.5vw; transition: all 0.3s; }
        .flip-fav-btn.active svg { color: #e50914; fill: #e50914; }

        .resume-card-layout { display: flex; flex-direction: column; height: 100%; width: 100%; background: #111; border-radius: 3vw; overflow: hidden; box-shadow: 0 4px 8px rgba(0,0,0,0.6); }
        .resume-img-area { position: relative; flex: 1; width: 100%; background: #000; overflow: hidden; }
        .resume-img-area img { width: 100%; height: 100%; object-fit: cover; position: absolute; top:0; left:0; } 
        .resume-play-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.5); width: 14vw; height: 14vw; border-radius: 50%; display: flex; justify-content: center; align-items: center; border: 0.5vw solid white; z-index: 10; box-shadow: 0 0 15px rgba(0,0,0,0.8); }
        .resume-play-center svg { width: 8vw; height: 8vw; margin-left: 1vw; color: white; }
        .resume-progress-bar { width: 100%; height: 1.2vh; background: rgba(255,255,255,0.2); }
        .resume-progress-fill { height: 100%; background: var(--primary); transition: width 0.3s ease; }
        .resume-bottom-area { height: 7vh; background: #1a1a1a; display: flex; justify-content: center; align-items: center; width: 100%; cursor: pointer;}
        .resume-info-icon { font-size: 5.5vw; font-weight: bold; font-family: 'Arial', sans-serif; color: #fff; border: 0.4vw solid #fff; width: 7vw; height: 7vw; border-radius: 50%; display: flex; justify-content: center; align-items: center; }

        .live-card { width: 100%; text-align: center; background: none; border: none; }
        .row-inner .live-card { width: 42vw; flex: 0 0 auto; } 
        .live-img-wrapper { width: 100%; aspect-ratio: 16 / 9; background: #111; border-radius: 3vw; overflow: hidden; display: flex; align-items: center; justify-content: center; border: 1px solid #333; position: relative; }
        .live-img-wrapper img { width: 80%; height: 80%; object-fit: contain; }
        .live-fallback-text { position: absolute; color: white; font-size: 4vw; font-weight: bold; text-align: center; width: 90%; word-wrap: break-word; }
        .live-title { font-size: 3.5vw; margin-top: 1vh; font-weight: bold; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .progress-bar { position: absolute; bottom: 0; left:0; width: 100%; height: 1.5vh; background: rgba(0,0,0,0.8); z-index: 20; }
        .progress-fill { height: 100%; background: var(--primary); transition: width 0.3s ease; }

        .load-more-btn { background: rgba(40,40,40,0.9); color: white; padding: 2vh 6vw; font-size: 4vw; border-radius: 2vw; border: 1px solid rgba(255,255,255,0.2); font-weight: bold; margin: 0 auto; display: block; margin-bottom: 5vh; }

        .details-layout { display: flex; flex-direction: column; gap: 3vh; align-items: center; padding: calc(env(safe-area-inset-top) + 2vh) 4vw 4vw 4vw; }
        .details-poster { width: 45vw; aspect-ratio: 2/3; border-radius: 3vw; box-shadow: 0 2vh 6vh rgba(0,0,0,0.9); object-fit: cover; }
        .details-title { font-size: 7vw; font-weight: bold; text-align: center; margin: 0; }
        .details-meta-box { display: flex; flex-wrap: wrap; justify-content: center; gap: 3vw; background: rgba(255,255,255,0.05); padding: 2vh; border-radius: 3vw; width: 100%; }
        .meta-item { display: flex; flex-direction: column; align-items: center; font-size: 3.5vw; color: #ccc; }
        .meta-val { display: flex; align-items: center; gap: 1vw; font-size: 4.5vw; font-weight: bold; color: white; margin-top: 0.5vh; }
        
        .action-btn { display: flex; justify-content: center; align-items: center; gap: 2vw; background: white; color: black; border: none; padding: 2vh; font-size: 4.5vw; font-weight: bold; border-radius: 2vw; width: 100%; text-align: center; margin-bottom: 1vh;}
        .action-btn.outline { background: transparent; color: white; border: 1px solid white; }
        
        .episodes-list { width: 100%; display: flex; flex-direction: column; gap: 2vh; padding-bottom: 5vh; }
        .ep-card { width: 100%; background: rgba(35,35,35,0.85); padding: 3vh 4vw; border-radius: 2vw; display: flex; justify-content: space-between; align-items: center; color: white; font-size: 4.5vw; font-weight: bold; border:none; position: relative; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .ep-progress { position: absolute; bottom: 0; left: 0; width: 100%; height: 1vh; background: rgba(0,0,0,0.4); }
        .ep-progress-fill { height: 100%; background: var(--primary); transition: width 0.3s ease; }

        .login-wrapper { background: rgba(20, 20, 20, 0.9); padding: 6vw; border-radius: 4vw; text-align: center; width: 90vw; margin: 20vh auto; }
        .login-wrapper input { width: 100%; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: white; padding: 4vw; border-radius: 2vw; font-size: 4vw; margin-bottom: 2vh; text-align: center;}
        
        .profiles-header { font-size: 7vw; font-weight: bold; color: white; text-align: center; margin-top: calc(env(safe-area-inset-top) + 10vh); margin-bottom: 5vh; }
        .profiles-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 6vw; padding: 0 5vw; }
        
        .profile-card { position: relative; width: 35vw; aspect-ratio: 1; background: linear-gradient(145deg, #1f1f1f, #121212); border-radius: 4vw; color: white; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; }
        .profile-options-btn { position: absolute; top: 1.5vh; left: 2vw; font-size: 5vw; color: white; width: 7vw; height: 7vw; display: flex; justify-content: center; align-items: center; background: rgba(0,0,0,0.6); border-radius: 50%; z-index: 10; font-weight: bold; }
        .profile-menu { position: absolute; top: 8vh; left: 2vw; background: #222; border-radius: 2vw; overflow: hidden; z-index: 20; box-shadow: 0 1vh 2vh rgba(0,0,0,0.8); min-width: 25vw; border: 1px solid #444; }
        .profile-menu div { padding: 1.5vh 4vw; font-size: 4vw; color: white; border-bottom: 1px solid #333; text-align: center; }
        .profile-menu div:last-child { border-bottom: none; color: #e50914; }
    </style>
</head>

<script>
    const supabaseUrl = 'https://kpfymvtyqbyjmlqfgujo.supabase.co';
    const supabaseKey = 'sb_publishable_g7dHfpmPHcQwAWsO9FFuGw_4lG8fyLc';
    const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

    let iptv = { domain: '', user: '', pass: '' };
    let currentProfile = ''; let currentTab = 'movies'; 
    let activeStreamData = null; let searchTimeout = null;
    let currentCategoryItems = []; let displayedItemsCount = 0; const ITEMS_PER_PAGE = 30;

    window.allLoadedItems = {};
    window.pendingFetches = {};
    let editingProfileName = null;
    
    // 🔥 الذاكرة الشاملة لتحديث أشرطة التقدم في كل مكان بالتطبيق
    window.userActivityMap = {};

    function showToast(msg) { const t = document.getElementById('toast'); t.innerText = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 4000); }

    // 🔥 حماية العناوين القادمة من السيرفر قبل إدخالها كـ HTML (تفادي كسر الواجهة أو حقن أكواد)
    function escapeHtml(str) {
        if (str === null || str === undefined) return '';
        return String(str).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }

    document.addEventListener('click', () => {
        document.querySelectorAll('.profile-menu').forEach(m => m.classList.add('hidden'));
    });

    // 🔥 قوائم الأفلام/المسلسلات/القنوات تُعتبر صالحة لمدة يوم كامل - بعدها يتم تحديثها تلقائيًا بالخلفية عند أول فتح للتطبيق
    const STALE_AFTER_MS = 24 * 60 * 60 * 1000; // 24 ساعة

    function performNetworkFetch(url) {
        return new Promise((resolve, reject) => {
            if (window.ReactNativeWebView) {
                const reqId = Math.random().toString(36).substring(7);
                window.pendingFetches[reqId] = { resolve, reject };
                setTimeout(() => { if (window.pendingFetches[reqId]) { window.pendingFetches[reqId].reject(new Error('Timeout')); delete window.pendingFetches[reqId]; }}, 25000);
                window.ReactNativeWebView.postMessage(JSON.stringify({ type: 'PROXY_FETCH', url: url, reqId: reqId }));
            } else { fetch(url).then(r => r.json()).then(resolve).catch(reject); }
        });
    }

    // 🔥 apiFetch الآن يدعم Stale-While-Revalidate:
    // لو البيانات موجودة بالكاش (حتى لو قديمة) تُعرض فورًا للمستخدم بدون أي انتظار للسيرفر،
    // وبنفس الوقت (لو كانت قديمة) يتم جلب نسخة جديدة بالخلفية وتمرر عبر onBackgroundUpdate لتحديث الواجهة بهدوء دون قطع تجربة المستخدم.
    async function apiFetch(action, extraParams = '', forceRefresh = false, onBackgroundUpdate = null) {
        let domain = iptv.domain || document.getElementById('iptv-domain').value.trim();
        let user = iptv.user || document.getElementById('iptv-user').value.trim();
        let pass = iptv.pass || document.getElementById('iptv-pass').value.trim();
        if (domain.endsWith('/')) domain = domain.slice(0, -1);
        if (!domain.startsWith('http')) domain = 'http://' + domain;
        if(!iptv.domain) { iptv.domain = domain; iptv.user = user; iptv.pass = pass; }

        const urlPath = `${action}_${extraParams}`;
        const cacheReq = new Request(`https://amjad.cache/${urlPath}`);
        const isInfoRequest = action === 'get_vod_info' || action === 'get_series_info';

        let url = `${domain}/player_api.php?username=${encodeURIComponent(user)}&password=${encodeURIComponent(pass)}`;
        if (action) url += `&action=${action}`;
        if (extraParams) url += extraParams;

        const cache = await caches.open('amjad-data').catch(() => null);

        const fetchAndStore = async () => {
            const data = await performNetworkFetch(url);
            if (cache) { try { await cache.put(cacheReq, new Response(JSON.stringify(data), { headers: new Headers({ 'x-cache-time': Date.now().toString() }) })); } catch(e) {} }
            return data;
        };

        if (!forceRefresh && cache) {
            try {
                const cachedRes = await cache.match(cacheReq);
                if (cachedRes) {
                    const cachedTime = parseInt(cachedRes.headers.get('x-cache-time') || '0');
                    const isStale = !isInfoRequest && (Date.now() - cachedTime >= STALE_AFTER_MS);
                    const cachedData = await cachedRes.json();

                    if (isStale) {
                        // تحديث هادئ بالخلفية - لا يعطل ولا يؤخر العرض الحالي، ويحصل دائمًا حتى لو مافيه callback
                        fetchAndStore().then(freshData => { if (onBackgroundUpdate) onBackgroundUpdate(freshData); }).catch(() => {});
                    }
                    return cachedData; // 🔥 عرض فوري من الكاش، بدون انتظار الشبكة
                }
            } catch(e) {}
        }

        return fetchAndStore();
    }

    async function forceRefreshCache() {
        showToast('جاري تحديث المكتبة من السيرفر...');
        try { await caches.delete('amjad-data'); } catch(e){}
        loadPage(currentTab);

    async function login() {
        const d = document.getElementById('iptv-domain').value.trim(); const u = document.getElementById('iptv-user').value.trim(); const p = document.getElementById('iptv-pass').value.trim();
        if(!d || !u || !p) { showToast('أدخل جميع البيانات'); return; }
        try {
            iptv = {domain: d, user: u, pass: p};
            const data = await apiFetch('', '', true);
            if (data && data.user_info && data.user_info.auth === 1) {
                let cDom = d.endsWith('/') ? d.slice(0, -1) : d; if (!cDom.startsWith('http')) cDom = 'http://' + cDom;
                iptv.domain = cDom; localStorage.setItem('iptv_domain', cDom); localStorage.setItem('iptv_user', u); localStorage.setItem('iptv_pass', p);
                fetchProfilesFromSupabase();
            } else throw new Error();
        } catch (e) { showToast('❌ بيانات غير صحيحة'); iptv = { domain: '', user: '', pass: '' }; }
    }

    // 🔥 يفحص هل قوائم المكتبة (أفلام/مسلسلات/قنوات) المخزنة محليًا أقدم من 24 ساعة
    // (لا يعتبرها "قديمة" لو كانت غير موجودة أصلاً - تلك حالة أول تحميل وليست تحديثًا)
    async function isLibraryDataStale() {
        const cache = await caches.open('amjad-data').catch(() => null);
        if (!cache) return false;
        const actions = ['get_vod_categories', 'get_series_categories', 'get_live_categories'];
        for (const action of actions) {
            try {
                const cachedRes = await cache.match(new Request(`https://amjad.cache/${action}_`));
                if (cachedRes) {
                    const cachedTime = parseInt(cachedRes.headers.get('x-cache-time') || '0');
                    if (Date.now() - cachedTime >= STALE_AFTER_MS) return true;
                }
            } catch(e) {}
        }
        return false;
    }

        currentProfile = name; document.getElementById('current-profile-name').innerText = name; 
        document.getElementById('profiles-screen').classList.add('hidden'); document.getElementById('main-screen').classList.remove('hidden'); 
        // 🔥 تشغيل الاستعلامين المستقلين بالتوازي بدل التتابع لتقليل زمن الدخول
        await Promise.all([fetchAllUserActivity(), loadFavoritesMap()]);
        if (await isLibraryDataStale()) {
            showToast('جاري تحديث مكتبة الأفلام والمسلسلات والقنوات...');
        }
        loadPage('movies');
        prefetchOtherTabsInBackground();
    }

    // فيصير التبديل بينهم فوريًا حتى في أول تشغيل للتطبيق (بدون أي تأخير محسوس للمستخدم الحالي)
    function prefetchOtherTabsInBackground() {
        setTimeout(async () => {
            try {
                const seriesCats = await apiFetch('get_series_categories');
                if (seriesCats && seriesCats[0]) await apiFetch('get_series', `&category_id=${seriesCats[0].category_id}`);
            } catch(e) {}
            try {
                const liveCats = await apiFetch('get_live_categories');
                if (liveCats && liveCats[0]) await apiFetch('get_live_streams', `&category_id=${liveCats[0].category_id}`);
            } catch(e) {}
        }, 1500);
    }

    async function saveNewProfile() {
        let newName = document.getElementById('new-profile-input').value.trim();
        if(!newName) return;
        document.getElementById('add-modal').classList.add('hidden'); 
        
        if (editingProfileName) {
            await supabaseClient.from('profiles').update({ profile_name: newName }).eq('username', iptv.user).eq('profile_name', editingProfileName);
            await supabaseClient.from('user_activity').update({ profile_name: newName }).eq('username', iptv.user).eq('profile_name', editingProfileName);
            await supabaseClient.from('favorites').update({ profile_name: newName }).eq('username', iptv.user).eq('profile_name', editingProfileName);
        } else {
            await supabaseClient.from('profiles').upsert({ username: iptv.user, profile_name: newName }, { onConflict: 'username,profile_name' }); 
        }
        fetchProfilesFromSupabase();

    function updateSearchPlaceholder(type) {
        const p = type === 'movies' ? 'ابحث في الافلام...' : type === 'series' ? 'ابحث في المسلسلات...' : type === 'live' ? 'ابحث في القنوات...' : 'ابحث في مفضلاتي...';
        document.getElementById('search-input').placeholder = p;
    }

    function handleSearch() {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(async () => {
            const query = document.getElementById('search-input').value.toLowerCase().trim();
            if (query === '') { loadPage(currentTab); return; }
            document.getElementById('continue-watching-container').innerHTML = ''; document.getElementById('categories-container').innerHTML = ''; document.getElementById('load-more-container').innerHTML = '';
            document.getElementById('grid-container').innerHTML = '<h3 style="grid-column: 1 / -1; text-align:center;">جاري البحث...</h3>';
            
            try {
                const allItems = currentTab === 'favorites' ? await loadSupabaseFavorites(true) : await apiFetch(currentTab === 'movies' ? 'get_vod_streams' : (currentTab === 'series' ? 'get_series' : 'get_live_streams'));
                currentCategoryItems = allItems.filter(item => { return (item.name || item.title || '').toLowerCase().includes(query); });
                document.getElementById('grid-container').innerHTML = ''; displayedItemsCount = 0;
                if(currentCategoryItems.length > 0) renderGridItems(currentTab === 'movies' ? 'movie' : (currentTab === 'series' ? 'series' : 'live'));
                else document.getElementById('grid-container').innerHTML = '<h3 style="grid-column: 1 / -1; text-align:center;">لا يوجد نتائج</h3>';
            } catch (e) {}
        }, 800);
    }

    async function loadPage(type, evt) {
        if(currentTab === type && document.getElementById('main-screen').scrollTop > 0) {
            document.getElementById('main-screen').scrollTo({top: 0, behavior: 'smooth'}); return;
        }

        currentTab = type; updateSearchPlaceholder(type);
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active')); if(evt && evt.target && evt.target.tagName === 'BUTTON') evt.target.classList.add('active');
        document.getElementById('search-input').value = '';
        // 🔥 تفريغ ذاكرة العناصر المؤقتة عند تبديل التبويب لتقليل استهلاك الذاكرة على المدى الطويل
        window.allLoadedItems = {};
        
        const grid = document.getElementById('grid-container'); 
        grid.className = 'grid-container'; 
        if (type === 'live') grid.classList.add('live-grid');
        
        document.getElementById('continue-watching-container').innerHTML = ''; document.getElementById('categories-container').innerHTML = '<h3 style="padding:4vw; text-align:center;">جاري التحميل...</h3>'; grid.innerHTML = ''; document.getElementById('load-more-container').innerHTML = '';

        if (type === 'movies') { await loadSupabaseRows('user_activity', `متابعة المشاهدة`, 'movie'); await fetchCategories('get_vod_categories', 'movie'); } 
        else if (type === 'series') { await loadSupabaseRows('user_activity', `متابعة المشاهدة`, 'series'); await fetchCategories('get_series_categories', 'series'); } 
        else if (type === 'live') { await fetchCategories('get_live_categories', 'live'); } 
        else if (type === 'favorites') { grid.classList.add('favorites-grid'); document.getElementById('categories-container').innerHTML = ''; const favs = await loadSupabaseFavorites(); currentCategoryItems = favs; displayedItemsCount = 0; renderGridItems('mixed'); }
    }

    async function loadSupabaseFavorites(returnRaw = false) {
        try {
            const { data } = await supabaseClient.from('favorites').select('*').eq('username', iptv.user).eq('profile_name', currentProfile);
            window.favoritesMap = new Map();
            const items = data.map(r => {
                window.favoritesMap.set(String(r.item_id), r.id);
                let obj = typeof r.item_data === 'string' ? JSON.parse(r.item_data) : r.item_data;
                obj.item_type = r.item_type; 
                return obj;
            });
            if(returnRaw) return items; return items;
        } catch(e) { return []; }
    }

    function renderCategoryChips(cats, itemType, keepActiveId = null) {
        let html = `<div class="categories-row">`;
        cats.forEach((cat, index) => {
            const isActive = keepActiveId ? String(cat.category_id) === String(keepActiveId) : index === 0;
            html += `<button class="category-chip ${isActive ? 'active' : ''}" data-id="${cat.category_id}">${escapeHtml(cat.category_name)}</button>`;
        });
        html += `</div>`;
        document.getElementById('categories-container').innerHTML = html;

        const streamAction = itemType === 'movie' ? 'get_vod_streams' : (itemType === 'series' ? 'get_series' : 'get_live_streams');
        const chips = document.querySelectorAll('.category-chip');
        chips.forEach(chip => {
            chip.onclick = () => {
                chips.forEach(c => c.classList.remove('active')); chip.classList.add('active');
                loadCategoryItems(chip.getAttribute('data-id'), streamAction, itemType);
            };
        });
        return streamAction;
    }

    async function fetchCategories(catAction, itemType) {
        const requestedTab = currentTab;
        try {
            const cats = await apiFetch(catAction, '', false, (freshCats) => {
                // 🔥 تحديث هادئ لشريط التصنيفات بالخلفية - فقط لو المستخدم لسا بنفس التبويب ولو القائمة تغيرت فعليًا
                if (currentTab !== requestedTab || !freshCats || freshCats.length === cats.length) return;
                const activeChip = document.querySelector('.category-chip.active');
                renderCategoryChips(freshCats, itemType, activeChip ? activeChip.getAttribute('data-id') : null);
            });
            if (!cats || cats.length === 0) return;
            const streamAction = renderCategoryChips(cats, itemType);
            loadCategoryItems(cats[0].category_id, streamAction, itemType);
        } catch (e) {}
    }

    let activeCategoryRequestId = 0;

    async function loadCategoryItems(catId, streamAction, itemType) {
        const myRequestId = ++activeCategoryRequestId;
        document.getElementById('grid-container').innerHTML = '<h3 style="grid-column: 1 / -1; text-align:center;">جاري التحميل...</h3>';
        document.getElementById('load-more-container').innerHTML = '';
        try {
            const extraParams = `&category_id=${catId}`;
            currentCategoryItems = await apiFetch(streamAction, extraParams, false, (freshItems) => {
                // 🔥 لو المستخدم فتح تصنيف آخر أثناء انتظار التحديث بالخلفية، تجاهل النتيجة القديمة
                if (myRequestId !== activeCategoryRequestId || !freshItems) return;
                // فقط أعِد الرسم لو تغيّر عدد العناصر فعليًا (إضافة/حذف قنوات أو أفلام)، لتجنّب قطع تفاعل المستخدم بلا داعٍ
                if (freshItems.length === currentCategoryItems.length) return;
                currentCategoryItems = freshItems; displayedItemsCount = 0;
                renderGridItems(itemType);
            });
            if (myRequestId !== activeCategoryRequestId) return; // المستخدم غيّر التصنيف قبل اكتمال الطلب
            displayedItemsCount = 0; document.getElementById('grid-container').innerHTML = '';
            if(currentCategoryItems.length > 0) renderGridItems(itemType);
            else document.getElementById('grid-container').innerHTML = '<h3 style="grid-column: 1 / -1; text-align:center;">التصنيف فارغ</h3>';
        } catch(e) {}
    }

    function createCardHtml(item, type, resumeTime = 0, isResumeRow = false) {
        const itemId = String(item.stream_id || item.series_id || item.id);
        window.allLoadedItems[itemId] = item;
        
        const rawTitle = item.name || item.title || 'بدون اسم';
        const title = escapeHtml(rawTitle);
        const imgUrl = item.stream_icon || item.cover || '';
        const rating = item.rating ? `<svg class="svg-icon" style="width:3.5vw;height:3.5vw; color:var(--primary);"><use href="#icon-star"></use></svg> ${escapeHtml(item.rating)}` : '';
        
        if (type === 'live') {
            return `
                <div class="live-img-wrapper">
                    <img src="${imgUrl}" loading="lazy" decoding="async" onerror="this.style.display='none'; this.nextElementSibling.classList.remove('hidden');">
                    <span class="live-fallback-text hidden">${title}</span>
                </div>
                <div class="live-title">${title}</div>
            `;
        } else {
            // 🔥 مزامنة التقدم من الذاكرة الشاملة لجميع القوائم
            let actualResumeTime = resumeTime > 0 ? resumeTime : (window.userActivityMap[itemId] ? window.userActivityMap[itemId].resume_time : 0);
            let assumedDuration = type === 'series' ? 3000 : 7200;
            let progPercent = actualResumeTime > 0 ? Math.min((actualResumeTime / assumedDuration) * 100, 100) : 0;

            if (isResumeRow) {
                return `
                    <div class="card-container" style="pointer-events: auto;" onclick="window.resumeItem('${itemId}', '${type}')">
                        <div class="resume-card-layout">
                            <div class="resume-img-area">
                                <img src="${imgUrl}" loading="lazy" decoding="async" onerror="this.style.display='none';">
                                <div class="resume-play-center">
                                    <svg class="svg-icon"><use href="#icon-play"></use></svg>
                                </div>
                            </div>
                            ${progPercent > 0 ? `<div class="resume-progress-bar"><div class="resume-progress-fill" style="width: ${progPercent}%"></div></div>` : ''}
                            <div class="resume-bottom-area" onclick="event.stopPropagation(); window.openItemDetails('${itemId}', '${type}');">
                                <div class="resume-info-icon">!</div>
                            </div>
                        </div>
                    </div>
                `;
            }

            // 🔥 تصميم الفليب كارد مع الشريط السفلي المقسم
            return `
                <div class="card" onclick="window.flipCard(this, '${itemId}', '${type}')">
                    <div class="card-front">
                        <img src="${imgUrl}" loading="lazy" decoding="async" onerror="this.style.display='none'; this.nextElementSibling.classList.remove('hidden');">
                        <span class="live-fallback-text hidden" style="top:50%; left:5%; transform:translateY(-50%);">${title}</span>
                        ${progPercent > 0 ? `<div class="progress-bar"><div class="progress-fill" style="width: ${progPercent}%"></div></div>` : ''}
                    </div>
                    <div class="card-back">
                        <div class="card-back-content">
                            <div class="card-back-text">${title}</div>
                            <div class="card-back-text" style="margin-top:1vh;">${rating}</div>
                            <div class="card-back-text dynamic-meta" style="margin-top:1vh;"><span style="font-size:2.5vw; opacity:0.5;">اضغط للتحميل</span></div>
                        </div>
                        <div class="flip-footer-bar">
                            <div class="flip-footer-btn flip-footer-right" onclick="event.stopPropagation(); window.openItemDetails('${itemId}', '${type}')">!</div>
                            <div class="flip-footer-btn flip-footer-left flip-fav-btn" onclick="event.stopPropagation(); window.toggleFavFromGrid(this, '${itemId}', '${type}')">
                                <svg class="svg-icon"><use href="#icon-heart"></use></svg>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }
    }

    window.toggleFavFromGrid = async (btnEl, id, type) => {
        let item = window.allLoadedItems[id];
        if (!item) return;
        const idStr = String(id);
        const icon = btnEl.querySelector('svg');
        try {
            if (window.favoritesMap.has(idStr)) {
                const rowId = window.favoritesMap.get(idStr);
                window.favoritesMap.delete(idStr);
                icon.style.color = 'white'; icon.style.fill = 'currentColor'; showToast('تمت الإزالة من المفضلة');
                await supabaseClient.from('favorites').delete().eq('id', rowId);
            } else { 
                icon.style.color = '#e50914'; icon.style.fill = '#e50914'; showToast('تم الإضافة إلى المفضلة');
                const { data } = await supabaseClient.from('favorites').insert([{ username: iptv.user, profile_name: currentProfile, item_id: idStr, item_type: type, item_data: item }]).select('id').single();
                if (data) window.favoritesMap.set(idStr, data.id);
            }
        } catch(e) {}
    };

    window.flipCard = async (el, id, type) => {
        el.classList.toggle('flipped');
        if (el.classList.contains('flipped') && !el.dataset.fetched) {
            el.dataset.fetched = "true";
            const metaDiv = el.querySelector('.dynamic-meta');
            metaDiv.innerHTML = "جاري التحميل...";
            
            // 🔥 قراءة حالة المفضلة فوراً من الذاكرة المحلية بدل انتظار السيرفر
            const isFav = window.favoritesMap && window.favoritesMap.has(String(id));
            const favIcon = el.querySelector('.flip-fav-btn svg');
            if (favIcon) { favIcon.style.color = isFav ? '#e50914' : 'white'; favIcon.style.fill = isFav ? '#e50914' : 'currentColor'; }

            let action = type === 'movie' ? `get_vod_info&vod_id=${id}` : `get_series_info&series_id=${id}`;
            apiFetch(action).then(data => {
                const info = data.info || {};
                let durOrSeas = '-';
                if (type === 'movie') durOrSeas = info.duration || info.runtime || '-';
                else if (data.episodes) {
                    const seasons = Object.keys(data.episodes);
                    durOrSeas = seasons.length === 1 ? `${data.episodes[seasons[0]].length} حلقة` : `${seasons.length} مواسم`;
                }
                metaDiv.innerHTML = `<svg class="svg-icon"><use href="#icon-time"></use></svg> ${durOrSeas}`;
            }).catch(() => metaDiv.innerHTML = "");
        }
    };

    window.resumeItem = async (id, type) => {
        let item = window.allLoadedItems[id] || activeStreamData;
        if(!item) return;
        activeStreamData = { ...item, type, id };
        
        try {
            const { data } = await supabaseClient.from('user_activity').select('*').eq('username', iptv.user).eq('profile_name', currentProfile).eq('movie_id', String(id)).maybeSingle();
            if (data) {
                activeStreamData.resume_time = data.resume_time || 0;
                activeStreamData.episodes_progress = data.item_data.episodes_progress || {};
                activeStreamData.current_episode_id = data.item_data.current_episode_id || null;
                activeStreamData.current_episode_num = data.item_data.current_episode_num || null;
                activeStreamData.current_episode_ext = data.item_data.current_episode_ext || 'mkv';
                activeStreamData.season_num = data.item_data.season_num || null;
            }
        } catch (err) {}

        if (type === 'movie') {
            playStream(id, 'movie', item.container_extension || 'mkv', activeStreamData.resume_time || 0);
        } else if (type === 'series') {
            showToast('جاري التجهيز...');
            try {
                const data = await apiFetch('get_series_info', `&series_id=${id}`);
                const episodesObj = data.episodes || {};
                window.masterEpsList = [];
                let domain = iptv.domain; if (!domain.startsWith('http')) domain = 'http://' + domain;
                
                Object.keys(episodesObj).forEach(s => {
                    episodesObj[s].forEach(ep => {
                        window.masterEpsList.push({ id: String(ep.id), episode_num: ep.episode_num, seasonNum: s, container_extension: ep.container_extension || 'mkv', url: `${domain}/series/${iptv.user}/${iptv.pass}/${ep.id}.${ep.container_extension || 'mkv'}` });
                    });
                });
                
                if(window.masterEpsList.length > 0) {
                    let targetEpId = activeStreamData.current_episode_id || window.masterEpsList[0].id;
                    let targetEp = window.masterEpsList.find(x => x.id === targetEpId) || window.masterEpsList[0];
                    
                    activeStreamData.current_episode_id = targetEp.id;
                    activeStreamData.current_episode_num = targetEp.episode_num;
                    activeStreamData.current_episode_ext = targetEp.container_extension;
                    activeStreamData.season_num = targetEp.seasonNum;
                    
                    let epResumeTime = (activeStreamData.episodes_progress && activeStreamData.episodes_progress[targetEp.id]) ? activeStreamData.episodes_progress[targetEp.id] : (activeStreamData.resume_time || 0);
                    
                    playStream(targetEp.id, 'series', targetEp.container_extension, epResumeTime, window.masterEpsList);
                }
            } catch(e) {}
        }
    }

    window.openItemDetails = (id, type) => {
        let item = window.allLoadedItems[id];
        if(item) openDetails(item, type);
    }

    function renderGridItems(type, append = false) {
        const container = document.getElementById('grid-container');
        if (!append) container.innerHTML = '';
        const nextBatch = currentCategoryItems.slice(displayedItemsCount, displayedItemsCount + ITEMS_PER_PAGE);
        const fragment = document.createDocumentFragment();

        nextBatch.forEach(item => {
            const wrapper = document.createElement('div');
            wrapper.className = type === 'live' ? 'live-card' : 'card-container';
            let actualType = type === 'mixed' ? (item.item_type || item.type || 'movie') : type;
            wrapper.innerHTML = createCardHtml(item, actualType);
            if(actualType === 'live') wrapper.onclick = () => playStream(item.stream_id || item.id, 'live', '');
            fragment.appendChild(wrapper);
        });
        container.appendChild(fragment);

        displayedItemsCount += nextBatch.length;
        const loadMore = document.getElementById('load-more-container');
        if (displayedItemsCount < currentCategoryItems.length) {
            loadMore.innerHTML = ''; const btn = document.createElement('button'); btn.className = 'load-more-btn'; btn.innerText = 'تحميل المزيد ↓';
            btn.onclick = () => renderGridItems(type, true); loadMore.appendChild(btn);
        } else loadMore.innerHTML = '';
    }

    async function silentRefreshContinueWatching() {
        const container = document.getElementById('continue-watching-container');
        container.innerHTML = '';
        if (currentTab === 'movies') await loadSupabaseRows('user_activity', `متابعة المشاهدة`, 'movie');
        else if (currentTab === 'series') await loadSupabaseRows('user_activity', `متابعة المشاهدة`, 'series');
    }

    async function loadSupabaseRows(tableName, rowTitle, filterType) {
        const container = document.getElementById('continue-watching-container');
        try {
            let query = supabaseClient.from(tableName).select('*').eq('username', iptv.user).eq('profile_name', currentProfile);
            if (filterType) query = query.eq('item_type', filterType);
            if (tableName === 'user_activity') query = query.order('updated_at', { ascending: false }).limit(10);

            const { data } = await query;
            if(data && data.length > 0) {
                const wrapper = document.createElement('div');
                wrapper.innerHTML = `<div class="row-title">${rowTitle}</div><div class="row-inner"></div>`;
                const inner = wrapper.querySelector('.row-inner');
                const fragment = document.createDocumentFragment();

                data.forEach(row => {
                    let obj = typeof row.item_data === 'string' ? JSON.parse(row.item_data) : row.item_data;
                    if(!obj) return;
                    
                    const wrap = document.createElement('div'); wrap.className = row.item_type === 'live' ? 'live-card' : 'card-container';
                    if(row.item_type === 'series') obj.season_num = obj.season_num || row.item_data.season_num;
                    
                    wrap.innerHTML = createCardHtml(obj, row.item_type, tableName === 'user_activity' ? row.resume_time : 0, true);
                    if(row.item_type === 'live') wrap.onclick = () => playStream(obj.stream_id || obj.id, 'live', '');
                    fragment.appendChild(wrap);
                });
                inner.appendChild(fragment);
                container.appendChild(wrapper);
            }
        } catch(e) {}
    }

    async function openDetails(item, type, autoPlay = false) {
        history.pushState({view: 'details'}, 'Details', '#details');
        
        document.getElementById('detail-title').innerText = 'جاري التحميل...';
        document.getElementById('detail-poster').src = '';
        document.getElementById('detail-meta').innerHTML = '';
        document.getElementById('detail-actions').innerHTML = '';
        document.getElementById('detail-desc').innerText = '';
        document.getElementById('episodes-container').innerHTML = '';
        
        document.getElementById('main-screen').classList.add('hidden'); document.getElementById('details-screen').classList.remove('hidden');
        
        const id = String(item.stream_id || item.series_id || item.id);
        activeStreamData = { ...item, type, id, resume_time: 0, episodes_progress: {} };

        try {
            const { data } = await supabaseClient.from('user_activity').select('*').eq('username', iptv.user).eq('profile_name', currentProfile).eq('movie_id', id).maybeSingle();
            if (data) {
                activeStreamData.resume_time = data.resume_time || 0;
                activeStreamData.episodes_progress = data.item_data.episodes_progress || {};
                activeStreamData.current_episode_id = data.item_data.current_episode_id || null;
                activeStreamData.current_episode_num = data.item_data.current_episode_num || null;
                activeStreamData.current_episode_ext = data.item_data.current_episode_ext || 'mkv';
                activeStreamData.season_num = data.item_data.season_num || null;
            }
        } catch (err) {}

        document.getElementById('detail-title').innerText = item.name || item.title || 'بدون اسم';
        document.getElementById('detail-poster').src = item.stream_icon || item.cover;
        
        try {
            const data = await apiFetch(type === 'movie' ? 'get_vod_info' : 'get_series_info', type === 'movie' ? `&vod_id=${id}` : `&series_id=${id}`);
            const info = data.info || {};
            document.getElementById('detail-desc').innerText = info.plot || info.description || 'لا يوجد وصف متاح.';
            
            let durOrSeas = '-';
            if (type === 'movie') durOrSeas = info.duration || info.runtime || '-';
            else if (data.episodes) {
                const seasons = Object.keys(data.episodes);
                durOrSeas = seasons.length === 1 ? `${data.episodes[seasons[0]].length} حلقة` : `${seasons.length} مواسم`;
            }

            document.getElementById('detail-meta').innerHTML = `
                <div class="meta-item">التقييم<span class="meta-val"><svg class="svg-icon" style="color:var(--primary)"><use href="#icon-star"></use></svg> ${info.rating || '-'}</span></div>
                <div class="meta-item">الإصدار<span class="meta-val"><svg class="svg-icon"><use href="#icon-calendar"></use></svg> ${info.year || info.releasedate || '-'}</span></div>
                <div class="meta-item">المدة/الأجزاء<span class="meta-val"><svg class="svg-icon"><use href="#icon-time"></use></svg> ${durOrSeas}</span></div>
                <div class="meta-item">النوع<span class="meta-val"><svg class="svg-icon"><use href="#icon-movie"></use></svg> ${info.genre || '-'}</span></div>
            `;

            let actionsHtml = `<button class="action-btn outline" id="fav-btn" onclick="toggleFavorite()"><svg class="svg-icon"><use href="#icon-heart"></use></svg> أضف للمفضلة</button>`;

            if (type === 'movie') {
                actionsHtml = `<button class="action-btn" onclick="playStream('${id}', 'movie', '${item.container_extension || 'mkv'}', ${activeStreamData.resume_time || 0})"><svg class="svg-icon"><use href="#icon-play"></use></svg> تشغيل الفيلم</button>` + actionsHtml;
                document.getElementById('series-episodes-col').classList.add('hidden'); 
                if(autoPlay) playStream(id, 'movie', item.container_extension || 'mkv', activeStreamData.resume_time || 0);
            } else if (type === 'series') {
                if (activeStreamData.current_episode_id && activeStreamData.resume_time > 0) {
                    let sNum = activeStreamData.season_num || '?';
                    let eNum = activeStreamData.current_episode_num || '?';
                    actionsHtml = `<button class="action-btn" onclick="playStream('${activeStreamData.current_episode_id}', 'series', '${activeStreamData.current_episode_ext}', ${activeStreamData.resume_time}, window.masterEpsList)"><svg class="svg-icon"><use href="#icon-play"></use></svg> متابعة مشاهدة S${sNum}:E${eNum}</button>` + actionsHtml;
                    if(autoPlay) playStream(activeStreamData.current_episode_id, 'series', activeStreamData.current_episode_ext, activeStreamData.resume_time);
                }
                document.getElementById('series-episodes-col').classList.remove('hidden'); 
                if (data.episodes) renderSeasons(data.episodes);
            }
            document.getElementById('detail-actions').innerHTML = actionsHtml;
            checkIfFavorite(); 
        } catch (e) {}
    }

    function checkIfFavorite() {
        const favBtn = document.getElementById('fav-btn');
        if (!favBtn || !activeStreamData) return;
        if (window.favoritesMap && window.favoritesMap.has(String(activeStreamData.id))) {
            favBtn.innerHTML = '<svg class="svg-icon"><use href="#icon-close"></use></svg> إزالة من المفضلة'; favBtn.style.background = 'var(--primary)'; favBtn.style.color = 'white'; favBtn.style.border = 'none';
        }
    }

    async function toggleFavorite() {
        const favBtn = document.getElementById('fav-btn');
        const idStr = String(activeStreamData.id);
        try {
            if (window.favoritesMap.has(idStr)) {
                const rowId = window.favoritesMap.get(idStr);
                window.favoritesMap.delete(idStr);
                favBtn.innerHTML = '<svg class="svg-icon"><use href="#icon-heart"></use></svg> أضف للمفضلة'; favBtn.style.background = 'transparent'; favBtn.style.border = '1px solid white'; 
                showToast('تمت الإزالة من المفضلة');
                await supabaseClient.from('favorites').delete().eq('id', rowId);
            } else { 
                favBtn.innerHTML = '<svg class="svg-icon"><use href="#icon-close"></use></svg> إزالة من المفضلة'; favBtn.style.background = 'var(--primary)'; favBtn.style.border = 'none'; 
                showToast('تم الإضافة إلى المفضلة');
                const { data } = await supabaseClient.from('favorites').insert([{ username: iptv.user, profile_name: currentProfile, item_id: idStr, item_type: activeStreamData.type, item_data: activeStreamData }]).select('id').single();
                if (data) window.favoritesMap.set(idStr, data.id);
            }
        } catch(e) {}
    }

    function renderSeasons(episodesObj) {
        const select = document.getElementById('season-selector'); select.innerHTML = '';
        
        window.masterEpsList = [];
        let domain = iptv.domain; if (!domain.startsWith('http')) domain = 'http://' + domain;

        Object.keys(episodesObj).forEach(s => {
            let opt = document.createElement('option'); opt.value = s; opt.innerText = `الموسم ${s}`; select.appendChild(opt);
            episodesObj[s].forEach(ep => window.masterEpsList.push({
                id: String(ep.id), episode_num: ep.episode_num, seasonNum: s, container_extension: ep.container_extension || 'mkv',
                url: `${domain}/series/${iptv.user}/${iptv.pass}/${ep.id}.${ep.container_extension || 'mkv'}`
            }));
        });
        
        select.onchange = () => renderEpisodes(episodesObj[select.value], select.value);
        if(Object.keys(episodesObj).length > 0) renderEpisodes(episodesObj[Object.keys(episodesObj)[0]], Object.keys(episodesObj)[0]);
    }

    function renderEpisodes(epsList, currentSeason) {
        const container = document.getElementById('episodes-container'); container.innerHTML = '';
        epsList.forEach((ep) => {
            const div = document.createElement('button'); div.className = 'ep-card';
            div.dataset.id = ep.id;
            
            let epIdStr = String(ep.id);
            let epResumeTime = 0;
            if (activeStreamData.episodes_progress && activeStreamData.episodes_progress[epIdStr]) {
                epResumeTime = activeStreamData.episodes_progress[epIdStr];
            } else if (String(activeStreamData.current_episode_id) === epIdStr) {
                epResumeTime = activeStreamData.resume_time;
            }
            
            let progPercent = epResumeTime > 0 ? Math.min((epResumeTime / 3000) * 100, 100) : 0;
            let pBar = progPercent > 0 ? `<div class="ep-progress"><div class="ep-progress-fill" style="width: ${progPercent}%"></div></div>` : '';

            div.innerHTML = `<span>الحلقة ${ep.episode_num || '-'}</span> <svg class="svg-icon"><use href="#icon-play"></use></svg> ${pBar}`;
            
            div.onclick = () => { 
                activeStreamData.current_episode_id = epIdStr; activeStreamData.current_episode_num = ep.episode_num; activeStreamData.current_episode_ext = ep.container_extension || 'mkv'; 
                activeStreamData.season_num = currentSeason;
                playStream(ep.id, 'series', ep.container_extension || 'mkv', epResumeTime, window.masterEpsList); 
            }; 
            container.appendChild(div);
        });
    }

    function playStream(streamId, type, ext, resumeTime = 0, allEpisodes = []) {
        let domain = iptv.domain; if (!domain.startsWith('http')) domain = 'http://' + domain;
        let url = type === 'live' ? `${domain}/${iptv.user}/${iptv.pass}/${streamId}` : `${domain}/${type === 'movie' ? 'movie' : 'series'}/${iptv.user}/${iptv.pass}/${streamId}.${ext}`;
        let parentId = activeStreamData ? activeStreamData.id : streamId;

        history.pushState({view: 'player'}, 'Player', '#player');

        if (window.ReactNativeWebView) window.ReactNativeWebView.postMessage(JSON.stringify({ 
            type: 'PLAY_VIDEO', url: url, videoId: String(parentId), userId: iptv.user, profileName: currentProfile, 
            itemType: type, itemData: activeStreamData, resumeTime: Number(resumeTime), 
            allEpisodes: allEpisodes 
        }));
    }

    // 🔥 التحديث الحي للمزامنة الشاملة عند الرجوع
    window.onVideoClosed = (progressSec, durationSec) => {
        if (activeStreamData) {
            let itemIdStr = String(activeStreamData.id);
            if (!window.userActivityMap[itemIdStr]) window.userActivityMap[itemIdStr] = { type: activeStreamData.type, episodes_progress: {} };

            if (activeStreamData.type === 'series' && activeStreamData.current_episode_id) {
                let epIdStr = String(activeStreamData.current_episode_id);
                if (!activeStreamData.episodes_progress) activeStreamData.episodes_progress = {};
                activeStreamData.episodes_progress[epIdStr] = progressSec;
                activeStreamData.resume_time = progressSec; 
                
                window.userActivityMap[itemIdStr].episodes_progress[epIdStr] = progressSec;
                window.userActivityMap[itemIdStr].resume_time = progressSec;
            } else {
                activeStreamData.resume_time = progressSec;
                window.userActivityMap[itemIdStr].resume_time = progressSec;
            }
            
            silentRefreshContinueWatching();

            if (!document.getElementById('details-screen').classList.contains('hidden')) {
                if (activeStreamData.type === 'series') {
                    let sNum = activeStreamData.season_num || '?';
                    let eNum = activeStreamData.current_episode_num || '?';
                    let actionsHtml = `<button class="action-btn outline" id="fav-btn" onclick="toggleFavorite()"><svg class="svg-icon"><use href="#icon-heart"></use></svg> أضف للمفضلة</button>`;
                    actionsHtml = `<button class="action-btn" onclick="playStream('${activeStreamData.current_episode_id}', 'series', '${activeStreamData.current_episode_ext}', ${progressSec}, window.masterEpsList)"><svg class="svg-icon"><use href="#icon-play"></use></svg> متابعة مشاهدة S${sNum}:E${eNum}</button>` + actionsHtml;
                    document.getElementById('detail-actions').innerHTML = actionsHtml;
                    checkIfFavorite();

                    let epCard = document.querySelector(`.ep-card[data-id="${activeStreamData.current_episode_id}"]`);
                    if (epCard) {
                        let progBar = epCard.querySelector('.ep-progress-fill');
                        let progPercent = Math.min((progressSec / 3000) * 100, 100);
                        if (progBar) {
                            progBar.style.width = progPercent + '%';
                        } else if (progPercent > 0) {
                            epCard.innerHTML += `<div class="ep-progress"><div class="ep-progress-fill" style="width: ${progPercent}%"></div></div>`;
                        }
                    }
                } else {
                    let actionsHtml = `<button class="action-btn outline" id="fav-btn" onclick="toggleFavorite()"><svg class="svg-icon"><use href="#icon-heart"></use></svg> أضف للمفضلة</button>`;
                    actionsHtml = `<button class="action-btn" onclick="playStream('${activeStreamData.id}', 'movie', '${activeStreamData.container_extension || 'mkv'}', ${progressSec})"><svg class="svg-icon"><use href="#icon-play"></use></svg> تشغيل الفيلم</button>` + actionsHtml;
                    document.getElementById('detail-actions').innerHTML = actionsHtml;
                    checkIfFavorite();
                }
            }
        }
    };

    window.addEventListener('popstate', () => { 
        document.getElementById('details-screen').classList.add('hidden'); 
        document.getElementById('main-screen').classList.remove('hidden');
        silentRefreshContinueWatching();
    });
</script>
</body>
</html>
