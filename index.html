<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Stream IPTV - Mobile UI</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* 🔥 أقفال صارمة لمنع الاهتزاز والمساحات الفارغة نهائياً */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root { --bg: #0a0a0a; --primary: #e50914; --text: #ffffff; }
        html, body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; position: fixed; overscroll-behavior: none; }
        ::-webkit-scrollbar { display: none; }
        .hidden { display: none !important; }

        /* الشاشات القابلة للتمرير محددة العرض والطول */
        .scrollable-screen { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; overflow-y: auto; overflow-x: hidden; background: var(--bg); -webkit-overflow-scrolling: touch; }
        
        #toast { visibility: hidden; width: 90vw; max-width: 400px; background-color: rgba(229, 9, 20, 0.95); color: #fff; text-align: center; border-radius: 2vw; padding: 3vw 4vw; position: fixed; z-index: 10000; left: 50%; transform: translateX(-50%); bottom: 4vh; font-size: 4vw; font-weight: bold; box-shadow: 0 1vh 3vh rgba(0,0,0,0.8); transition: opacity 0.4s; opacity: 0; }
        #toast.show { visibility: visible; opacity: 1; }

        header { width: 100vw; padding: 4vw; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; gap: 2vh; z-index: 100; box-shadow: 0 2vh 4vh rgba(0,0,0,0.5); }
        .logo { font-size: 8vw; font-weight: 900; color: var(--primary); letter-spacing: 2px; text-align: center; }
        .nav-links { display: flex; flex-wrap: wrap; gap: 2vw; justify-content: center; width: 100%; }
        .nav-item { background: rgba(255,255,255,0.1); border: none; color: white; font-size: 3.5vw; font-weight: 600; cursor: pointer; padding: 1.5vh 3vw; border-radius: 20px; transition: 0.3s; }
        .nav-item.active { background: var(--primary); }
        .search-box { width: 100%; margin-top: 1vh; }
        .search-box input { width: 100%; background: rgba(255,255,255,0.15); border: 0.1vw solid rgba(255,255,255,0.3); color: white; padding: 2vh 4vw; border-radius: 30px; font-size: 4vw; outline: none; text-align: center; }
        .user-info { font-size: 3vw; color: #ccc; margin-top: 1vh; }

        #main-content { padding-top: 2vh; padding-bottom: 10vh; width: 100vw; overflow-x: hidden; box-sizing: border-box; }
        .row-container { margin-bottom: 3vh; width: 100vw; }
        .row-title { font-size: 5vw; font-weight: bold; margin: 0 4vw 1vh 4vw; }
        
        /* قفل التمرير الأفقي حتى لا يوسع الصفحة */
        .row-inner { display: flex; gap: 3vw; overflow-x: auto; padding: 1vh 4vw; width: 100vw; box-sizing: border-box; scroll-behavior: smooth; }
        .categories-row { display: flex; gap: 2vw; overflow-x: auto; padding: 1vh 4vw; width: 100vw; box-sizing: border-box; scroll-behavior: smooth; }
        .category-chip { background: rgba(255,255,255,0.1); color: white; padding: 1.5vh 4vw; border-radius: 30px; font-size: 3.5vw; font-weight: bold; white-space: nowrap; border: none; }
        .category-chip.active { background: var(--primary); }
        
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(28vw, 1fr)); gap: 3vw; padding: 2vh 4vw; margin-bottom: 5vh; width: 100vw; box-sizing: border-box; }
        
        .card { border-radius: 2vw; position: relative; background: #1a1a1a; padding: 0; margin: 0; border: none; width: 100%; aspect-ratio: 2 / 3; overflow: hidden; }
        .row-inner .card { width: 28vw; flex: 0 0 auto; }
        .card img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 2; }
        
        .live-card { width: 100%; text-align: center; background: none; border: none; }
        .row-inner .live-card { width: 25vw; flex: 0 0 auto; }
        .live-img-wrapper { width: 100%; aspect-ratio: 1 / 1; background: #000; border-radius: 2vw; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .live-img-wrapper img { width: 90%; height: 90%; object-fit: contain; z-index: 2; }
        .live-title { font-size: 3vw; margin-top: 1vh; font-weight: bold; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .progress-bar { position: absolute; bottom: 0; left:0; width: 100%; height: 1vh; background: rgba(0,0,0,0.6); z-index: 5; }
        .progress-fill { height: 100%; background: var(--primary); }

        .load-more-container { text-align: center; padding-bottom: 5vh; width: 100%; }
        .load-more-btn { background: rgba(40,40,40,0.9); color: white; padding: 2vh 6vw; font-size: 4vw; border-radius: 2vw; border: 1px solid rgba(255,255,255,0.2); font-weight: bold; }

        /* شاشة التفاصيل */
        #details-screen { padding: 4vh 4vw; background-size: cover; background-position: center; }
        .details-layout { display: flex; flex-direction: column; gap: 3vh; align-items: center; width: 100%; }
        .details-poster-col { width: 50vw; aspect-ratio: 2/3; border-radius: 3vw; overflow: hidden; box-shadow: 0 2vh 6vh rgba(0,0,0,0.9); position: relative; }
        .details-poster { width: 100%; height: 100%; object-fit: cover; }
        .details-info-col { width: 100%; text-align: center; display: flex; flex-direction: column; gap: 2vh; }
        .details-title { font-size: 7vw; font-weight: bold; margin: 0; }
        .details-meta { font-size: 3vw; color: #ccc; display: flex; flex-wrap: wrap; justify-content: center; gap: 2vw; background: rgba(255,255,255,0.1); padding: 1.5vh; border-radius: 2vw; }
        .action-bar { display: flex; flex-direction: column; gap: 2vh; width: 100%; }
        .action-btn { background: white; color: black; border: none; padding: 2vh; font-size: 4vw; font-weight: bold; border-radius: 2vw; width: 100%; text-align: center; }
        .action-btn.fav { background: rgba(50,50,50,0.8); color: white; border: 1px solid white; }
        .seasons-select { background: rgba(30,30,30,0.85); color: white; padding: 2vh; font-size: 4vw; border-radius: 2vw; width: 100%; border: 1px solid white; }
        .details-desc { font-size: 3.5vw; line-height: 1.6; opacity: 0.9; text-align: justify; }
        .details-episodes-col { width: 100%; }
        .episodes-list-vertical { display: flex; flex-direction: column; gap: 2vh; }
        .ep-card { background: rgba(35,35,35,0.85); padding: 2.5vh 4vw; border-radius: 2vw; display: flex; justify-content: space-between; align-items: center; color: white; font-size: 4vw; border: none; }

        /* شاشات الدخول */
        #login-screen, #profiles-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--bg); }
        .login-wrapper { background: rgba(20, 20, 20, 0.9); padding: 6vw; border-radius: 4vw; text-align: center; width: 90vw; box-shadow: 0 1vh 3vh rgba(0,0,0,0.5); }
        .login-logo { color: var(--primary); font-size: 10vw; font-weight: 900; margin: 0 0 2vh 0; }
        .login-title { font-size: 6vw; color: white; margin: 0 0 1vh 0; }
        .login-subtitle { font-size: 3.5vw; color: #aaa; margin: 0 0 4vh 0; }
        .login-form { display: flex; flex-direction: column; gap: 2.5vh; }
        .login-form input { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: white; padding: 4vw; border-radius: 2vw; font-size: 4vw; outline: none; text-align: center; }
        .login-btn { background: var(--primary); color: white; border: none; padding: 4vw; font-size: 4.5vw; border-radius: 2vw; font-weight: bold; margin-top: 2vh; }
        
        .profiles-container { display: flex; gap: 4vw; flex-wrap: wrap; justify-content: center; margin-top: 4vh; }
        .profile-card { width: 25vw; height: 25vw; background: #222; border-radius: 3vw; display: flex; align-items: center; justify-content: center; font-size: 5vw; font-weight: bold; color: white; border: none; }
        .modal-box { background: #1a1a1a; padding: 6vw; border-radius: 4vw; text-align: center; width: 90vw; }
        .modal-box input { width: 100%; padding: 4vw; font-size: 4vw; margin: 3vh 0; border-radius: 2vw; border: none; text-align: center; }
    </style>
</head>
<body>

    <div id="toast">إشعار</div>

    <div id="login-screen" class="scrollable-screen">
        <div class="login-wrapper">
            <h1 class="login-logo">STREAM</h1>
            <h2 class="login-title">تسجيل الدخول</h2>
            <p class="login-subtitle">أدخل بيانات الـ IPTV الخاص بك</p>
            <div class="login-form">
                <input type="text" id="iptv-domain" placeholder="رابط السيرفر (مثال: http://domain.com:80)">
                <input type="text" id="iptv-user" placeholder="اسم المستخدم">
                <input type="password" id="iptv-pass" placeholder="كلمة المرور">
                <button id="login-btn" class="login-btn" onclick="login()">دخول</button>
            </div>
        </div>
    </div>

    <div id="add-modal" class="hidden" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.9); z-index: 1000; display: flex; justify-content: center; align-items: center;">
        <div class="modal-box">
            <h2 style="color:white; font-size: 5vw;">اسم المستخدم الجديد</h2>
            <input type="text" id="new-profile-input" placeholder="اكتب الاسم...">
            <div style="display: flex; flex-direction: column; gap: 2vh;">
                <button class="action-btn" onclick="saveNewProfile()">حفظ وإنشاء</button>
                <button class="action-btn fav" onclick="document.getElementById('add-modal').classList.add('hidden')">إلغاء</button>
            </div>
        </div>
    </div>

    <div id="profiles-screen" class="scrollable-screen hidden">
        <h1 style="font-size: 6vw; margin-top: 10vh; color:white;">من يشاهد الآن؟</h1>
        <div class="profiles-container" id="profiles-list"></div>
        <div style="display: flex; flex-direction: column; gap: 2vh; margin-top: 8vh; width: 80vw;">
            <button class="action-btn" onclick="openAddProfileModal()">+ إضافة مستخدم</button>
            <button class="action-btn fav" onclick="logout()">تسجيل الخروج</button>
        </div>
    </div>

    <div id="main-screen" class="scrollable-screen hidden">
        <header id="main-header">
            <div class="logo">STREAM</div>
            <div class="nav-links">
                <button class="nav-item active" onclick="loadPage('movies')">أفلام</button>
                <button class="nav-item" onclick="loadPage('series')">مسلسلات</button>
                <button class="nav-item" onclick="loadPage('live')">بث مباشر</button>
                <button class="nav-item" onclick="loadPage('favorites')">مفضلاتي</button>
            </div>
            <div class="search-box">
                <input type="text" id="search-input" placeholder="🔍 ابحث هنا..." onkeyup="handleSearch()">
            </div>
            <div class="user-info">
                المستخدم: <span id="current-profile-name"></span>
                <span style="color: var(--primary); margin-right: 2vw; font-weight: bold;" onclick="changeProfile()">[تبديل]</span>
            </div>
        </header>

        <div id="main-content">
            <div id="continue-watching-container"></div>
            <div id="categories-container"></div>
            <div id="grid-container" class="grid-container"></div>
            <div id="load-more-container" class="load-more-container"></div>
        </div>
    </div>

    <div id="details-screen" class="scrollable-screen hidden">
        <div class="details-layout" id="details-layout-container">
            <div class="details-poster-col">
                <img id="detail-poster" class="details-poster" src="">
                <div id="detail-progress-container" class="progress-bar hidden"><div id="detail-progress-fill" class="progress-fill"></div></div>
            </div>
            <div class="details-info-col">
                <h1 id="detail-title" class="details-title"></h1>
                <div class="details-meta" id="detail-meta"></div>
                <div class="action-bar" id="detail-actions"></div>
                <p class="details-desc" id="detail-desc"></p>
            </div>
            <div class="details-episodes-col hidden" id="series-episodes-col">
                <div id="episodes-container" class="episodes-list-vertical"></div>
            </div>
            <button class="action-btn" style="background: rgba(255,255,255,0.2); color:white; margin-top: 2vh;" onclick="history.back()">رجوع</button>
        </div>
    </div>

<script>
    const supabaseUrl = 'https://kpfymvtyqbyjmlqfgujo.supabase.co';
    const supabaseKey = 'sb_publishable_g7dHfpmPHcQwAWsO9FFuGw_4lG8fyLc';
    const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

    let iptv = { domain: '', user: '', pass: '' };
    let currentProfile = '';
    let currentTab = 'movies'; 
    let activeStreamData = null; 
    let searchTimeout = null;
    let flatEpisodes = [];
    let currentCategoryItems = [];
    let displayedItemsCount = 0;
    const ITEMS_PER_PAGE = 50;

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg; t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 5000);
    }

    // 💡 الجسر السليم لاستقبال البيانات
    window.pendingFetches = {};

    async function apiFetch(action, extraParams = '') {
        let domain = iptv.domain || document.getElementById('iptv-domain').value.trim();
        let user = iptv.user || document.getElementById('iptv-user').value.trim();
        let pass = iptv.pass || document.getElementById('iptv-pass').value.trim();
        
        if (domain.endsWith('/')) domain = domain.slice(0, -1);
        if (!domain.startsWith('http')) domain = 'http://' + domain;
        
        if(!iptv.domain) { iptv.domain = domain; iptv.user = user; iptv.pass = pass; }

        let url = `${domain}/player_api.php?username=${user}&password=${pass}`;
        if (action) url += `&action=${action}`;
        if (extraParams) url += extraParams;

        return new Promise((resolve, reject) => {
            if (window.ReactNativeWebView) {
                const reqId = Math.random().toString(36).substring(7);
                window.pendingFetches[reqId] = { resolve, reject };
                
                setTimeout(() => {
                    if (window.pendingFetches[reqId]) {
                        window.pendingFetches[reqId].reject(new Error('انتهى وقت الطلب. ربما السيرفر محظور أو الرابط خاطئ.'));
                        delete window.pendingFetches[reqId];
                    }
                }, 15000);

                window.ReactNativeWebView.postMessage(JSON.stringify({
                    type: 'PROXY_FETCH', url: url, reqId: reqId
                }));
            } else {
                fetch(url).then(r => r.json()).then(resolve).catch(reject);
            }
        });
    }

    window.onload = () => {
        if(localStorage.getItem('iptv_user')) {
            iptv = { domain: localStorage.getItem('iptv_domain'), user: localStorage.getItem('iptv_user'), pass: localStorage.getItem('iptv_pass') };
            fetchProfilesFromSupabase();
        }
    };

    async function login() {
        const d = document.getElementById('iptv-domain').value.trim();
        const u = document.getElementById('iptv-user').value.trim();
        const p = document.getElementById('iptv-pass').value.trim();
        const btn = document.getElementById('login-btn');

        if(!d || !u || !p) { showToast('أدخل جميع البيانات'); return; }
        
        btn.innerText = 'جاري التحقق...'; btn.disabled = true;

        try {
            iptv.domain = d; iptv.user = u; iptv.pass = p;
            const data = await apiFetch('');
            
            if (data && data.user_info && data.user_info.auth === 1) {
                let cleanDomain = d.endsWith('/') ? d.slice(0, -1) : d;
                if (!cleanDomain.startsWith('http')) cleanDomain = 'http://' + cleanDomain;
                
                iptv.domain = cleanDomain;
                localStorage.setItem('iptv_domain', cleanDomain); 
                localStorage.setItem('iptv_user', u); 
                localStorage.setItem('iptv_pass', p);
                
                btn.innerText = 'دخول'; btn.disabled = false;
                fetchProfilesFromSupabase();
            } else { 
                throw new Error('بيانات الدخول غير صحيحة'); 
            }
        } catch (e) {
            // الآن سيظهر الإشعار بالتفصيل من داخل التطبيق!
            showToast('❌ ' + (e.message || 'فشل الاتصال بالسيرفر'));
            btn.innerText = 'دخول'; btn.disabled = false;
            iptv = { domain: '', user: '', pass: '' };
        }
    }

    function logout() {
        localStorage.removeItem('iptv_domain'); localStorage.removeItem('iptv_user'); localStorage.removeItem('iptv_pass');
        location.reload();
    }

    async function fetchProfilesFromSupabase() {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('main-screen').classList.add('hidden');
        document.getElementById('profiles-screen').classList.remove('hidden');
        
        const container = document.getElementById('profiles-list');
        container.innerHTML = '<h3 style="color:white; width:100%; text-align:center;">جاري الجلب...</h3>';
        try {
            const { data, error } = await supabaseClient.from('profiles').select('profile_name').eq('username', iptv.user);
            if(error) throw error; container.innerHTML = '';
            
            if(data && data.length > 0) {
                data.forEach(p => renderProfileCard(p.profile_name));
            } else {
                await supabaseClient.from('profiles').insert([{ username: iptv.user, profile_name: 'الرئيسي' }]);
                renderProfileCard('الرئيسي');
            }
        } catch (e) { container.innerHTML = '<h3 style="color:var(--primary); width:100%; text-align:center;">خطأ بالشبكة</h3>'; }
    }

    function renderProfileCard(name) {
        const card = document.createElement('button');
        card.className = 'profile-card'; card.innerText = name; card.onclick = () => selectProfile(name);
        document.getElementById('profiles-list').appendChild(card);
    }

    function openAddProfileModal() {
        document.getElementById('new-profile-input').value = '';
        document.getElementById('add-modal').classList.remove('hidden');
    }

    async function saveNewProfile() {
        let name = document.getElementById('new-profile-input').value.trim();
        if(name) {
            document.getElementById('add-modal').classList.add('hidden');
            document.getElementById('profiles-list').innerHTML = '<h3 style="color:white; width:100%; text-align:center;">جاري الحفظ...</h3>';
            await supabaseClient.from('profiles').upsert({ username: iptv.user, profile_name: name }, { onConflict: 'username,profile_name' });
            fetchProfilesFromSupabase();
        }
    }

    function selectProfile(name) {
        currentProfile = name;
        document.getElementById('current-profile-name').innerText = name;
        document.getElementById('profiles-screen').classList.add('hidden');
        document.getElementById('main-screen').classList.remove('hidden');
        loadPage('movies');
    }

    function changeProfile() { fetchProfilesFromSupabase(); }

    function handleSearch() {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(async () => {
            const query = document.getElementById('search-input').value.toLowerCase().trim();
            if (query === '') { loadPage(currentTab); return; }
            
            document.getElementById('continue-watching-container').innerHTML = ''; 
            document.getElementById('categories-container').innerHTML = ''; 
            document.getElementById('grid-container').innerHTML = '<h3 style="padding:5vw; width:100%; text-align:center;">🔍 جاري البحث...</h3>';
            document.getElementById('load-more-container').innerHTML = '';

            let action = currentTab === 'movies' ? 'get_vod_streams' : (currentTab === 'series' ? 'get_series' : 'get_live_streams');
            try {
                const allItems = await apiFetch(action);
                currentCategoryItems = allItems.filter(item => { return (item.name || item.title || '').toLowerCase().includes(query); });
                
                document.getElementById('grid-container').innerHTML = '';
                displayedItemsCount = 0;
                
                if(currentCategoryItems.length > 0) renderGridItems(currentTab === 'movies' ? 'movie' : (currentTab === 'series' ? 'series' : 'live'));
                else document.getElementById('grid-container').innerHTML = '<h3 style="padding:5vw; width:100%; text-align:center;">❌ لا يوجد نتائج</h3>';
            } catch (e) { document.getElementById('grid-container').innerHTML = '<h3 style="padding:5vw; width:100%; text-align:center;">خطأ</h3>'; }
        }, 800);
    }

    async function loadPage(type) {
        currentTab = type;
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        if(event && event.target && event.target.tagName === 'BUTTON') event.target.classList.add('active');
        document.getElementById('search-input').value = '';

        document.getElementById('continue-watching-container').innerHTML = ''; 
        document.getElementById('categories-container').innerHTML = '<h3 style="padding:4vw; text-align:center;">جاري التحميل...</h3>';
        document.getElementById('grid-container').innerHTML = '';
        document.getElementById('load-more-container').innerHTML = '';

        if (type === 'movies') {
            await loadSupabaseRows('user_activity', `متابعة المشاهدة`, 'movie');
            await fetchCategories('get_vod_categories', 'movie');
        } else if (type === 'series') {
            await loadSupabaseRows('user_activity', `متابعة المشاهدة`, 'series');
            await fetchCategories('get_series_categories', 'series');
        } else if (type === 'live') {
            await fetchCategories('get_live_categories', 'live');
        } else if (type === 'favorites') {
            document.getElementById('categories-container').innerHTML = '';
            await loadSupabaseRows('favorites', `المفضلة`, null);
        }
    }

    async function fetchCategories(catAction, itemType) {
        try {
            const cats = await apiFetch(catAction);
            let html = `
            <div class="row-container">
                <div class="categories-row">`;
                
            cats.forEach((cat, index) => {
                html += `<button class="category-chip ${index === 0 ? 'active' : ''}" data-id="${cat.category_id}">${cat.category_name}</button>`;
            });
            html += `</div></div>`;
            document.getElementById('categories-container').innerHTML = html;

            const chips = document.querySelectorAll('.category-chip');
            chips.forEach(chip => {
                chip.onclick = () => {
                    chips.forEach(c => c.classList.remove('active')); chip.classList.add('active');
                    let streamAction = itemType === 'movie' ? 'get_vod_streams' : (itemType === 'series' ? 'get_series' : 'get_live_streams');
                    loadCategoryItems(chip.getAttribute('data-id'), streamAction, itemType);
                };
            });

            if(cats.length > 0) {
                let streamAction = itemType === 'movie' ? 'get_vod_streams' : (itemType === 'series' ? 'get_series' : 'get_live_streams');
                loadCategoryItems(cats[0].category_id, streamAction, itemType);
            }
        } catch (e) { document.getElementById('categories-container').innerHTML = '<h3 style="padding:4vw; text-align:center;">خطأ في جلب التصنيفات</h3>'; }
    }

    async function loadCategoryItems(catId, streamAction, itemType) {
        document.getElementById('grid-container').innerHTML = '<h3 style="padding:4vw; width:100%; text-align:center;">جاري تحميل المكتبة...</h3>';
        document.getElementById('load-more-container').innerHTML = '';
        try {
            currentCategoryItems = await apiFetch(streamAction, `&category_id=${catId}`);
            displayedItemsCount = 0;
            document.getElementById('grid-container').innerHTML = '';
            if(currentCategoryItems.length > 0) renderGridItems(itemType);
            else document.getElementById('grid-container').innerHTML = '<h3 style="padding:4vw; width:100%; text-align:center;">التصنيف فارغ</h3>';
        } catch(e) { document.getElementById('grid-container').innerHTML = '<h3 style="padding:4vw; width:100%; text-align:center;">خطأ بالسيرفر</h3>'; }
    }

    function createCardHtml(item, type, resumeTime = 0) {
        const title = item.name || item.title || 'بدون اسم';
        const imgUrl = item.stream_icon || item.cover || '';
        
        if (type === 'live') {
            return `
                <div class="live-img-wrapper">
                    <img src="${imgUrl}" onerror="this.style.display='none';">
                </div>
                <div class="live-title">${title}</div>
            `;
        } else {
            let progressHtml = '';
            if (resumeTime > 0) {
                const progress = Math.min((resumeTime / 7200) * 100, 100);
                progressHtml = `<div class="progress-bar"><div class="progress-fill" style="width: ${progress}%"></div></div>`;
            }
            return `
                <img src="${imgUrl}" onerror="this.style.display='none';">
                ${progressHtml}
            `;
        }
    }

    function renderGridItems(type, append = false) {
        const container = document.getElementById('grid-container');
        if (!append) container.innerHTML = '';

        const nextBatch = currentCategoryItems.slice(displayedItemsCount, displayedItemsCount + ITEMS_PER_PAGE);
        
        nextBatch.forEach(item => {
            const card = document.createElement('button');
            card.className = type === 'live' ? 'live-card' : 'card';
            card.innerHTML = createCardHtml(item, type);
            
            card.onclick = () => {
                if (type === 'live') {
                    activeStreamData = { id: item.stream_id || item.id, type: 'live', name: item.name };
                    playStream(activeStreamData.id, 'live', '');
                } else { openDetails(item, type); }
            };
            container.appendChild(card);
        });

        displayedItemsCount += nextBatch.length;
        const loadMoreContainer = document.getElementById('load-more-container');
        if (displayedItemsCount < currentCategoryItems.length) {
            loadMoreContainer.innerHTML = '';
            const loadBtn = document.createElement('button');
            loadBtn.className = 'load-more-btn';
            loadBtn.innerText = 'تحميل المزيد ↓';
            loadBtn.onclick = () => renderGridItems(type, true);
            loadMoreContainer.appendChild(loadBtn);
        } else { loadMoreContainer.innerHTML = ''; }
    }

    async function loadSupabaseRows(tableName, rowTitle, filterType) {
        const container = document.getElementById('continue-watching-container');
        try {
            let query = supabaseClient.from(tableName).select('*').eq('username', iptv.user).eq('profile_name', currentProfile);
            if (filterType) query = query.eq('item_type', filterType);
            if (tableName === 'user_activity') query = query.order('updated_at', { ascending: false });

            const { data, error } = await query;
            if(error) throw error;

            if(data && data.length > 0) {
                const wrapper = document.createElement('div'); wrapper.className = 'row-container';
                wrapper.innerHTML = `<div class="row-title">${rowTitle}</div>`;
                const inner = document.createElement('div'); inner.className = 'row-inner';

                data.forEach(row => {
                    let obj = row.item_data;
                    if(typeof obj === 'string') { try { obj = JSON.parse(obj); } catch(e) {} }
                    if(!obj) return;

                    const isLive = row.item_type === 'live';
                    const card = document.createElement('button');
                    card.className = isLive ? 'live-card' : 'card';
                    card.innerHTML = createCardHtml(obj, row.item_type, tableName === 'user_activity' ? row.resume_time : 0);
                    
                    card.onclick = () => {
                        if (isLive) {
                            activeStreamData = { id: obj.stream_id || obj.id, type: 'live', name: obj.name };
                            playStream(activeStreamData.id, 'live', '');
                        } else {
                            activeStreamData = { ...obj, type: row.item_type, id: row.movie_id || row.item_id, resume_time: row.resume_time, current_episode_id: obj.current_episode_id || null, current_episode_num: obj.current_episode_num || null, current_episode_ext: obj.current_episode_ext || 'mkv' };
                            openDetails(obj, row.item_type);
                        }
                    };
                    inner.appendChild(card);
                });
                wrapper.appendChild(inner);
                container.appendChild(wrapper);
            }
        } catch(e) {}
    }

    async function openDetails(item, type) {
        history.pushState({view: 'details'}, 'Details', '#details');
        document.getElementById('main-screen').classList.add('hidden');
        document.getElementById('details-screen').classList.remove('hidden');
        document.getElementById('episodes-container').innerHTML = '';
        document.getElementById('detail-progress-container').classList.add('hidden');
        
        const id = item.stream_id || item.series_id || (activeStreamData ? activeStreamData.id : null);
        
        try {
            const { data: currentAct } = await supabaseClient.from('user_activity').select('*').eq('username', iptv.user).eq('profile_name', currentProfile).eq('movie_id', String(id)).maybeSingle();
            if(currentAct) {
                let parsedData = currentAct.item_data; if(typeof parsedData === 'string') parsedData = JSON.parse(parsedData);
                activeStreamData = { ...item, type, id, resume_time: currentAct.resume_time, current_episode_id: parsedData.current_episode_id || null, current_episode_num: parsedData.current_episode_num || null, current_episode_ext: parsedData.current_episode_ext || 'mkv' };
            } else { activeStreamData = { ...item, type, id, resume_time: 0 }; }
        } catch (err) { activeStreamData = { ...item, type, id, resume_time: 0 }; }

        document.getElementById('detail-title').innerText = item.name || item.title || 'بدون اسم';
        document.getElementById('detail-poster').src = item.stream_icon || item.cover;
        document.getElementById('details-screen').style.backgroundImage = `linear-gradient(to right, rgba(10,10,10,1) 10%, rgba(10,10,10,0.85) 100%), url('${item.stream_icon || item.cover}')`;

        let baseAction = type === 'movie' ? 'get_vod_info' : 'get_series_info';
        let extraParams = type === 'movie' ? `&vod_id=${id}` : `&series_id=${id}`;
        
        try {
            const data = await apiFetch(baseAction, extraParams);
            const info = data.info || {};
            
            document.getElementById('detail-desc').innerText = info.plot || info.description || 'لا يوجد وصف متاح.';
            let year = info.year || info.releasedate || '-';
            let genre = info.genre || '-';
            let durationOrSeasons = type === 'movie' ? (info.duration || info.runtime || '-') : (data.episodes ? `${Object.keys(data.episodes).length} مواسم` : '-');
            
            document.getElementById('detail-meta').innerHTML = `<span>📅 ${year}</span> | <span>🎬 ${genre}</span> | <span>⏱ ${durationOrSeasons}</span>`;

            let actionsHtml = '';
            const favBtnHtml = `<button class="action-btn fav" id="fav-btn" onclick="toggleFavorite()">❤ أضف للمفضلة</button>`;

            if (type === 'movie') {
                actionsHtml = `<button class="action-btn" onclick="playStream('${id}', 'movie', '${item.container_extension || 'mkv'}')">▶ تشغيل الفيلم</button>` + favBtnHtml;
                document.getElementById('series-episodes-col').classList.add('hidden'); 
                
                if (activeStreamData.resume_time > 0) {
                    const prog = Math.min((activeStreamData.resume_time / 7200) * 100, 100);
                    document.getElementById('detail-progress-container').classList.remove('hidden');
                    document.getElementById('detail-progress-fill').style.width = prog + '%';
                }
            } else if (type === 'series') {
                actionsHtml = favBtnHtml;
                if (activeStreamData.current_episode_id && activeStreamData.resume_time > 0) {
                    actionsHtml = `<button class="action-btn" style="background:var(--primary); color:white;" onclick="resumeSeriesPlayback()">▶ متابعة (حلقة ${activeStreamData.current_episode_num})</button>` + actionsHtml;
                }
                if (data.episodes) { actionsHtml += `<select id="season-selector" class="seasons-select"></select>`; }
                document.getElementById('series-episodes-col').classList.remove('hidden'); 

                flatEpisodes = [];
                let sortedSeasons = Object.keys(data.episodes).sort((a, b) => Number(a) - Number(b));
                sortedSeasons.forEach(s => {
                    let eps = data.episodes[s].sort((a, b) => Number(a.episode_num) - Number(b.episode_num));
                    flatEpisodes = flatEpisodes.concat(eps);
                });
            }
            
            document.getElementById('detail-actions').innerHTML = actionsHtml;
            checkIfFavorite(); 
            if (type === 'series' && data.episodes) renderSeasons(data.episodes);
        } catch (e) {
            document.getElementById('detail-actions').innerHTML = '<button class="action-btn" onclick="history.back()">رجوع</button>';
        }
    }

    function resumeSeriesPlayback() {
        if (activeStreamData && activeStreamData.current_episode_id) playStream(activeStreamData.current_episode_id, 'series', activeStreamData.current_episode_ext || 'mkv');
    }

    async function checkIfFavorite() {
        const { data } = await supabaseClient.from('favorites').select('id').eq('username', iptv.user).eq('profile_name', currentProfile).eq('item_id', String(activeStreamData.id));
        const favBtn = document.getElementById('fav-btn');
        if (data && data.length > 0) { favBtn.innerText = '❌ إزالة من المفضلة'; favBtn.style.background = 'var(--primary)'; }
    }

    async function toggleFavorite() {
        const { data } = await supabaseClient.from('favorites').select('id').eq('username', iptv.user).eq('profile_name', currentProfile).eq('item_id', String(activeStreamData.id));
        const favBtn = document.getElementById('fav-btn');
        
        if (data && data.length > 0) {
            await supabaseClient.from('favorites').delete().eq('id', data[0].id);
            favBtn.innerText = '❤ أضف للمفضلة'; favBtn.style.background = 'rgba(40,40,40,0.8)';
            showToast('تم الحذف');
        } else {
            await supabaseClient.from('favorites').insert([{ username: iptv.user, profile_name: currentProfile, item_id: String(activeStreamData.id), item_type: activeStreamData.type, item_data: activeStreamData }]);
            favBtn.innerText = '❌ إزالة من المفضلة'; favBtn.style.background = 'var(--primary)';
            showToast('تم الحفظ');
        }
    }

    function renderSeasons(episodesObj) {
        const select = document.getElementById('season-selector'); select.innerHTML = '';
        const seasons = Object.keys(episodesObj);
        seasons.forEach(s => { let opt = document.createElement('option'); opt.value = s; opt.innerText = `الموسم ${s}`; select.appendChild(opt); });
        select.onchange = () => renderEpisodes(episodesObj[select.value]);
        if(seasons.length > 0) renderEpisodes(episodesObj[seasons[0]]);
    }

    function renderEpisodes(epsList) {
        const container = document.getElementById('episodes-container'); container.innerHTML = '';
        epsList.forEach(ep => {
            let progressHtml = '';
            if (activeStreamData && activeStreamData.current_episode_id == ep.id && activeStreamData.resume_time > 0) {
                const prog = Math.min((activeStreamData.resume_time / 3000) * 100, 100);
                progressHtml = `<div class="ep-progress"><div class="ep-progress-fill" style="width:${prog}%"></div></div>`;
            }

            const div = document.createElement('button'); div.className = 'ep-card';
            div.innerHTML = `<span>الحلقة ${ep.episode_num || '-'}</span> <span>▶</span> ${progressHtml}`;
            div.onclick = () => {
                activeStreamData.current_episode_id = String(ep.id);
                activeStreamData.current_episode_num = ep.episode_num;
                activeStreamData.current_episode_ext = ep.container_extension || 'mkv';
                activeStreamData.resume_time = 0; 
                playStream(ep.id, 'series', ep.container_extension || 'mkv');
            }; 
            container.appendChild(div);
        });
    }

    function playStream(id, type, ext) {
        let domain = iptv.domain;
        if (!domain.startsWith('http')) domain = 'http://' + domain;
        
        let url = type === 'live' 
            ? `${domain}/${iptv.user}/${iptv.pass}/${id}` 
            : `${domain}/${type === 'movie' ? 'movie' : 'series'}/${iptv.user}/${iptv.pass}/${id}.${ext}`;
        
        if (window.ReactNativeWebView) {
            window.ReactNativeWebView.postMessage(JSON.stringify({ type: 'PLAY_VIDEO', url: url, videoId: String(id), userId: iptv.user }));
        } else {
            alert('يرجى فتح الموقع من داخل التطبيق.');
        }
    }

    window.addEventListener('popstate', () => {
        document.getElementById('details-screen').classList.add('hidden');
        document.getElementById('main-screen').classList.remove('hidden');
    });
</script>
